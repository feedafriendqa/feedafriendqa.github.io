<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Little Learners — Meet the Children Who Need a Sponsor</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--forest:#0A3D1F;--forest-mid:#145C30;--lime:#5CB85C;--lime-soft:#EAF5EA;--gold:#3AAFA4;--coral:#E05252;--muted:#5A7A65;--border:#C8DFC8;--cream:#F4F9F4;--shadow:0 4px 20px rgba(10,61,31,.09);--r:14px;--rs:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Quicksand',sans-serif;background:var(--cream);color:var(--forest);min-height:100vh;}
header{background:var(--forest);border-bottom:3px solid var(--gold);padding:0 14px;display:flex;align-items:center;height:56px;gap:10px;}
.logo{display:flex;align-items:center;gap:9px;}
.logo img{height:32px;width:auto;}
.logo-text{font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;color:white;}
.wrap{padding:16px 14px;max-width:1000px;margin:0 auto;}
.hero{background:var(--forest);border-radius:var(--r);padding:24px 20px;margin-bottom:20px;text-align:center;color:white;}
.hero h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:22px;}
.hero p{font-size:13.5px;opacity:.85;margin-top:8px;line-height:1.6;max-width:560px;margin-left:auto;margin-right:auto;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;}
.pcard{background:white;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;}
.pcard .photo{width:100%;aspect-ratio:1;object-fit:cover;background:var(--lime-soft);}
.pcard .body{padding:14px;flex:1;display:flex;flex-direction:column;}
.pcard .pname{font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:var(--forest);}
.pcard .page{font-size:12px;color:var(--muted);font-weight:700;margin-top:2px;}
.pcard .quote{font-size:13px;color:#3d5c46;margin-top:10px;line-height:1.5;flex:1;font-style:italic;}
.pcard .quote::before{content:"“";}
.pcard .quote::after{content:"”";}
.empty,.loading{text-align:center;padding:60px 20px;color:var(--muted);}
.empty .eicon{font-size:44px;margin-bottom:10px;}
.spinner{display:inline-block;width:26px;height:26px;border:3px solid rgba(10,61,31,.2);border-top-color:var(--forest);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

  <div class="hero">
    <h1>Meet the Children Who Need a Sponsor</h1>
    <p>Every child on this page is waiting for someone to sponsor their place on the Little Learners programme. Their names shown are first names or nicknames only, to protect their privacy.</p>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = "https://xbxagukdvgyaoqvbqoic.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhieGFndWtkdmd5YW9xdmJxb2ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDExNDAsImV4cCI6MjA5NTYxNzE0MH0.-NifUdfkr9cZIDDtKNl5aQe9WMZab7l4boAJDAgfb-4";

async function init() {
  if(!(window.supabase && window.supabase.createClient)) { setTimeout(init, 100); return; }
  const db = window.supabase.createClient(SUPA_URL, SUPA_KEY);
  const el = document.getElementById('content');
  try {
    const { data, error } = await db.rpc('get_sponsor_profiles');
    if(error) throw new Error(error.message);
    if(!data || !data.length) {
      el.innerHTML = `<div class="empty"><div class="eicon">💚</div><p>All children currently have a sponsor — thank you! Please check back soon.</p></div>`;
      return;
    }
    const cards = data.map(p => {
      const { data: urlData } = db.storage.from('donor-photos').getPublicUrl(p.sponsor_photo_path);
      const photo = urlData?.publicUrl || '';
      return `<div class="pcard">
        <img class="photo" src="${photo}" alt="${p.display_name}" loading="lazy">
        <div class="body">
          <div class="pname">${p.display_name}</div>
          <div class="page">${p.age != null ? 'Age ' + p.age : ''}</div>
          <div class="quote">${p.aspiration}</div>
        </div>
      </div>`;
    });
    el.innerHTML = `<div class="grid">${cards.join('')}</div>`;
  } catch(e) {
    el.innerHTML = `<div class="empty"><div class="eicon">⚠️</div><p>Could not load profiles right now. Please try again shortly.</p></div>`;
    console.error(e);
  }
}
init();
</script>
