<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Feed a Friend — Volunteer Portal</title>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<meta name="theme-color" content="#0A3D1F"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Feed a Friend"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A3D1F;font-family:Poppins,sans-serif;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade{animation:fadein .2s ease}
.card{transition:transform .15s,box-shadow .15s}
.card:active{transform:scale(0.98)}
#splash{position:fixed;inset:0;background:#0A3D1F;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999}
.spinner{width:40px;height:40px;border:4px solid #22C55E;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>
<div id="splash"><div class="spinner"></div><p style="color:#BBF7D0;font-size:12px;letter-spacing:2px">LOADING...</p></div>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState, useEffect} = React;
const sb = supabase.createClient("https://xbxagukdvgyaoqvbqoic.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhieGFndWtkdmd5YW9xdmJxb2ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDExNDAsImV4cCI6MjA5NTYxNzE0MH0.-NifUdfkr9cZIDDtKNl5aQe9WMZab7l4boAJDAgfb-4");
const LOGO = "https://xbxagukdvgyaoqvbqoic.supabase.co/storage/v1/object/public/avatars/Faflogowhite.png";
const EDGE = "https://xbxagukdvgyaoqvbqoic.supabase.co/functions/v1/clever-responder";
const DK="#0A3D1F",GN="#15803D",MD="#22C55E",PL="#F0FDF4",BR="#BBF7D0",MT="#4B7C5A";
const HF="'League Spartan',sans-serif",BF="'Poppins',sans-serif";
const inp = {width:"100%",padding:"12px 14px",border:"1.5px solid #BBF7D0",borderRadius:10,fontSize:15,fontFamily:BF,outline:"none",boxSizing:"border-box",background:"#fff",color:DK};
const PROJECTS = [
  {id:"food-boxes",label:"Food Boxes",emoji:"📦",bg:"#F5A623",light:"#FEF3C7",text:"#7C4D00"},
  {id:"welcome-baby",label:"Welcome Baby",emoji:"👶",bg:"#9B59B6",light:"#F3E8FF",text:"#5B21B6"},
  {id:"community-fridges",label:"Community Fridges",emoji:"🧊",bg:"#E8732A",light:"#FFEDD5",text:"#9A3412"},
  {id:"little-learners",label:"Little Learners",emoji:"📚",bg:"#1A9E8F",light:"#CCFBF1",text:"#134E4A"},
  {id:"pay-it-forward",label:"Pay it Forward",emoji:"🎁",bg:"#E74C3C",light:"#FEE2E2",text:"#991B1B"},
  {id:"giving-garden",label:"Giving Garden",emoji:"🌱",bg:"#8E44AD",light:"#EDE9FE",text:"#4C1D95"},
];
const gp = id => PROJECTS.find(p=>p.id===id)||PROJECTS[0];

async function sendEmail(type,name,email,adminEmail=""){
  try{ await fetch(EDGE,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhieGFndWtkdmd5YW9xdmJxb2ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDExNDAsImV4cCI6MjA5NTYxNzE0MH0.-NifUdfkr9cZIDDtKNl5aQe9WMZab7l4boAJDAgfb-4"},body:JSON.stringify({type,name,email,adminEmail})});}
  catch(e){console.log("Email error",e);}
}

async function uploadPhoto(userId, file){
  const ext = file.name.split(".").pop();
  const {data} = await sb.storage.from("avatars").upload(userId+"/avatar."+ext, file, {upsert:true});
  if(data){const {data:u} = sb.storage.from("avatars").getPublicUrl(data.path); return u.publicUrl;}
  return null;
}

function Tag({pid,sm}){
  const p=gp(pid);
  return <span style={{background:p.light,color:p.text,padding:sm?"2px 8px":"3px 10px",borderRadius:20,fontSize:sm?10:11,fontWeight:700,display:"inline-flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}>{p.emoji} {p.label}</span>;
}

function Avtr({u,sz=40}){
  if(u?.photo_url) return <img src={u.photo_url} style={{width:sz,height:sz,borderRadius:"50%",objectFit:"cover",flexShrink:0,border:"2px solid "+MD}}/>;
  const i=(u?.first_name?.[0]||"")+(u?.surname?.[0]||"");
  return <div style={{width:sz,height:sz,borderRadius:"50%",background:MD,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:HF,fontWeight:900,fontSize:sz*.35,color:DK,flexShrink:0}}>{i}</div>;
}

function RoleBadge({role}){
  if(role==="superadmin") return <span style={{background:"#7C3AED",color:"#fff",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700}}>⭐ Super Admin</span>;
  if(role==="admin") return <span style={{background:DK,color:MD,borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700}}>🛡️ Admin</span>;
  return null;
}

function Field({label,children}){
  return <div><label style={{display:"block",fontWeight:700,fontSize:13,color:DK,marginBottom:6,fontFamily:BF}}>{label}</label>{children}</div>;
}

function Toast({msg}){
  if(!msg) return null;
  return <div style={{position:"fixed",top:68,left:12,right:12,background:DK,color:"#fff",padding:"12px 16px",borderRadius:12,zIndex:9999,fontSize:14,fontWeight:600,textAlign:"center",border:"1px solid "+MD,fontFamily:BF}}>{msg}</div>;
}

function PhotoEditor({current,onSelect}){
  const [preview,setPreview] = useState(null);
  const [pos,setPos] = useState("center");
  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
    <div style={{position:"relative"}}>
      {preview
        ? <img src={preview} style={{width:80,height:80,borderRadius:"50%",objectFit:"cover",objectPosition:pos,border:"3px solid "+MD}}/>
        : <Avtr u={current} sz={80}/>
      }
      <label style={{position:"absolute",bottom:0,right:0,background:DK,borderRadius:"50%",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14,border:"2px solid #fff"}}>
        📷<input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{
          const f=e.target.files[0]; if(!f) return;
          const r=new FileReader(); r.onload=ev=>{setPreview(ev.target.result); onSelect(f,ev.target.result);};
          r.readAsDataURL(f);
        }}/>
      </label>
    </div>
    {preview && <div style={{display:"flex",gap:6}}>
      {["top","center","bottom"].map(p=><button key={p} onClick={()=>setPos(p)} style={{background:pos===p?DK:"#fff",color:pos===p?"#fff":DK,border:"1px solid "+BR,borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer",textTransform:"capitalize"}}>{p}</button>)}
    </div>}
    {!preview && <p style={{fontSize:12,color:MT,fontFamily:BF}}>Tap 📷 to change photo</p>}
  </div>;
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function Auth({onAuth}){
  const [mode,setMode]=useState("login");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(""), [msg,setMsg]=useState("");
  const [showPw,setShowPw]=useState(false);
  const [em,setEm]=useState(""), [pw,setPw]=useState("");
  const [r,setR]=useState({fn:"",sn:"",dob:"",email:"",pw:"",pw2:"",employment:"",student:false,studentLevel:"",studentSchool:"",working:false,prof:"",projs:[],photo:null,photoFile:null});

  async function login(){
    setErr(""); setLoading(true);
    const {data,error}=await sb.auth.signInWithPassword({email:em,password:pw});
    if(error){setErr(error.message);setLoading(false);return;}
    const {data:p}=await sb.from("profiles").select("*").eq("id",data.user.id).single();
    if(p&&!p.approved&&p.role!=="admin"&&p.role!=="superadmin"){await sb.auth.signOut();setErr("Your registration is pending admin approval.");setLoading(false);return;}
    onAuth(p); setLoading(false);
  }

  async function register(){
    setErr("");
    if(!r.fn||!r.sn||!r.dob||!r.email||!r.pw){setErr("Please fill in all required fields.");return;}
    if(r.pw!==r.pw2){setErr("Passwords do not match.");return;}
    if(r.pw.length<6){setErr("Password must be at least 6 characters.");return;}
    setLoading(true);
    const {data,error}=await sb.auth.signUp({email:r.email,password:r.pw});
    if(error){setErr(error.message);setLoading(false);return;}
    let photo_url=null;
    if(r.photoFile&&data.user) photo_url=await uploadPhoto(data.user.id,r.photoFile);
    await sb.from("profiles").insert({id:data.user.id,first_name:r.fn,surname:r.sn,email:r.email,dob:r.dob,is_student:r.employment==="student",student_level:r.studentLevel,student_school:r.studentSchool,is_working:r.employment==="working",profession:r.prof,projects:r.projs,photo_url,role:"volunteer",approved:false});
    await sendEmail("volunteer_pending",r.fn,r.email);
    await sendEmail("new_volunteer",r.fn+" "+r.sn,r.email,"salaam@feedafriend.org");
    setMsg("Registration submitted! An admin will review and approve your account shortly.");
    setMode("login"); setLoading(false);
  }

  async function forgot(){
    if(!em){setErr("Please enter your email.");return;}
    await sb.auth.resetPasswordForEmail(em,{redirectTo:window.location.href});
    setMsg("Reset email sent! Check your inbox."); setMode("login");
  }

  const tp=id=>setR(x=>{const p=x.projs.includes(id)?x.projs.filter(i=>i!==id):[...x.projs,id];return{...x,projs:p};});
  const card={background:"#fff",borderRadius:20,padding:"28px 22px",width:"100%",maxWidth:420};
  const bg={minHeight:"100vh",background:DK,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 16px",fontFamily:BF};

  return <div className="fade" style={bg}>
    <img src={LOGO} alt="Feed a Friend" style={{height:70,marginBottom:6}}/>
    <p style={{fontSize:11,color:MD,letterSpacing:2,textTransform:"uppercase",marginBottom:20}}>Volunteer Portal</p>
    {msg&&<div style={{background:"#DCFCE7",color:DK,borderRadius:12,padding:"12px 16px",marginBottom:16,fontSize:13,width:"100%",maxWidth:420,textAlign:"center",fontWeight:600}}>{msg}</div>}

    {mode==="login"&&<div style={card}>
      <h2 style={{fontFamily:HF,fontSize:22,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:4}}>Sign In</h2>
      <p style={{color:MT,fontSize:13,marginBottom:20}}>Welcome back!</p>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <Field label="Email"><input type="email" placeholder="you@email.com" value={em} onChange={e=>setEm(e.target.value)} style={inp}/></Field>
        <Field label="Password">
          <div style={{position:"relative"}}>
            <input type={showPw?"text":"password"} placeholder="••••••••" value={pw} onChange={e=>setPw(e.target.value)} style={{...inp,paddingRight:50}}/>
            <button onClick={()=>setShowPw(s=>!s)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:12,color:MT}}>{showPw?"Hide":"Show"}</button>
          </div>
        </Field>
        {err&&<p style={{color:"#DC2626",fontSize:13,fontWeight:600}}>{err}</p>}
        <button onClick={login} disabled={loading} style={{background:MD,color:DK,border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",opacity:loading?.7:1}}>{loading?"Signing in...":"Sign In →"}</button>
        <button onClick={()=>{setMode("forgot");setErr("")}} style={{background:"none",border:"none",color:MT,fontSize:13,cursor:"pointer",textDecoration:"underline"}}>Forgot password?</button>
      </div>
      <div style={{borderTop:"1px solid "+BR,marginTop:20,paddingTop:16,textAlign:"center"}}>
        <p style={{fontSize:13,color:MT}}>New volunteer? <span onClick={()=>{setMode("register");setErr("")}} style={{color:GN,fontWeight:700,cursor:"pointer"}}>Register here</span></p>
      </div>
    </div>}

    {mode==="forgot"&&<div style={card}>
      <h2 style={{fontFamily:HF,fontSize:22,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:4}}>Reset Password</h2>
      <p style={{color:MT,fontSize:13,marginBottom:20}}>Enter your email for a reset link.</p>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <Field label="Email"><input type="email" placeholder="you@email.com" value={em} onChange={e=>setEm(e.target.value)} style={inp}/></Field>
        {err&&<p style={{color:"#DC2626",fontSize:13,fontWeight:600}}>{err}</p>}
        <button onClick={forgot} style={{background:MD,color:DK,border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer"}}>Send Reset Link</button>
        <button onClick={()=>setMode("login")} style={{background:"none",border:"none",color:MT,fontSize:13,cursor:"pointer",textDecoration:"underline"}}>← Back</button>
      </div>
    </div>}

    {mode==="register"&&<div style={{...card,maxHeight:"85vh",overflowY:"auto"}}>
      <h2 style={{fontFamily:HF,fontSize:22,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:4}}>Register</h2>
      <p style={{color:MT,fontSize:13,marginBottom:20}}>Join our volunteer community.</p>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <Field label="Profile Photo">
          <PhotoEditor current={null} onSelect={(f,prev)=>setR(x=>{return{...x,photo:prev,photoFile:f};})}/> 
        </Field>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Field label="First Name *"><input type="text" placeholder="Sara" value={r.fn} onChange={e=>setR(x=>{return{...x,fn:e.target.value};} )} style={inp}/></Field>
          <Field label="Surname *"><input type="text" placeholder="Ahmed" value={r.sn} onChange={e=>setR(x=>{return{...x,sn:e.target.value};} )} style={inp}/></Field>
        </div>
        <Field label="Date of Birth *"><input type="date" value={r.dob} onChange={e=>setR(x=>{return{...x,dob:e.target.value};} )} style={inp}/></Field>
        <Field label="Email *"><input type="email" placeholder="you@email.com" value={r.email} onChange={e=>setR(x=>{return{...x,email:e.target.value};} )} style={inp}/></Field>
        <Field label="Password *"><input type="password" placeholder="Min. 6 characters" value={r.pw} onChange={e=>setR(x=>{return{...x,pw:e.target.value};} )} style={inp}/></Field>
        <Field label="Confirm Password *"><input type="password" placeholder="Repeat password" value={r.pw2} onChange={e=>setR(x=>{return{...x,pw2:e.target.value};} )} style={inp}/></Field>
        <Field label="Employment Status *">
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {[{val:"student",label:"🎓 Student"},{val:"working",label:"💼 Working"},{val:"not_working",label:"🏠 Not currently working"}].map(opt=><label key={opt.val} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"10px 12px",borderRadius:10,background:r.employment===opt.val?"#F0FDF4":"#fff",border:"1.5px solid "+(r.employment===opt.val?GN:BR)}}>
              <input type="radio" name="employment" value={opt.val} checked={r.employment===opt.val} onChange={e=>setR(x=>{return{...x,employment:e.target.value,student:e.target.value==="student",working:e.target.value==="working"};} )} style={{width:18,height:18,accentColor:GN}}/>
              <span style={{fontSize:14,fontWeight:600,color:r.employment===opt.val?GN:DK}}>{opt.label}</span>
            </label>)}
          </div>
        </Field>
        {r.employment==="student"&&<div style={{display:"flex",flexDirection:"column",gap:10,padding:"14px",background:PL,borderRadius:12,border:"1px solid "+BR}}>
          <Field label="Level of study">
            <select value={r.studentLevel} onChange={e=>setR(x=>{return{...x,studentLevel:e.target.value};} )} style={inp}>
              <option value="">Select level...</option>
              <option>Secondary School (GCSE)</option><option>Sixth Form / A-Levels</option>
              <option>Undergraduate</option><option>Postgraduate</option><option>Other</option>
            </select>
          </Field>
          <Field label="School / University"><input type="text" placeholder="e.g. University of Manchester" value={r.studentSchool} onChange={e=>setR(x=>{return{...x,studentSchool:e.target.value};} )} style={inp}/></Field>
        </div>}
        {r.employment==="working"&&<div style={{padding:"14px",background:PL,borderRadius:12,border:"1px solid "+BR}}>
          <Field label="Profession"><input type="text" placeholder="e.g. Teacher, Nurse..." value={r.prof} onChange={e=>setR(x=>{return{...x,prof:e.target.value};} )} style={inp}/></Field>
        </div>}
        <Field label="Projects you're interested in">
          <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:4}}>
            {PROJECTS.map(p=><label key={p.id} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"10px 12px",borderRadius:10,background:r.projs.includes(p.id)?p.light:"#fff",border:"1.5px solid "+(r.projs.includes(p.id)?p.bg:BR)}}>
              <input type="checkbox" checked={r.projs.includes(p.id)} onChange={()=>tp(p.id)} style={{width:18,height:18,accentColor:p.bg}}/>
              <span style={{fontSize:18}}>{p.emoji}</span>
              <span style={{fontSize:14,fontWeight:600,color:r.projs.includes(p.id)?p.text:DK}}>{p.label}</span>
            </label>)}
          </div>
        </Field>
        {err&&<p style={{color:"#DC2626",fontSize:13,fontWeight:600}}>{err}</p>}
        <button onClick={register} disabled={loading} style={{background:DK,color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",opacity:loading?.7:1}}>{loading?"Submitting...":"Submit Registration"}</button>
        <button onClick={()=>{setMode("login");setErr("")}} style={{background:"none",border:"none",color:MT,fontSize:13,cursor:"pointer",textDecoration:"underline"}}>← Back to Sign In</button>
      </div>
    </div>}
    <p style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:20}}>feedafriend.org · Volunteer Portal</p>
  </div>;
}

// ── PROFILE EDIT SCREEN (shared) ─────────────────────────────────────────────
function ProfileEdit({profile, onSave, onBack}){
  const [fn,setFn]=useState(profile.first_name||"");
  const [sn,setSn]=useState(profile.surname||"");
  const [dob,setDob]=useState(profile.dob||"");
  const [employment,setEmployment]=useState(profile.is_student?"student":profile.is_working?"working":"not_working");
  const [studentLevel,setStudentLevel]=useState(profile.student_level||"");
  const [studentSchool,setStudentSchool]=useState(profile.student_school||"");
  const [prof,setProf]=useState(profile.profession||"");
  const [projs,setProjs]=useState(profile.projects||[]);
  const [photoFile,setPhotoFile]=useState(null);
  const [saving,setSaving]=useState(false);
  const isAdmin = profile.role==="admin"||profile.role==="superadmin";

  const tp=id=>setProjs(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

  async function save(){
    setSaving(true);
    let photo_url = profile.photo_url;
    if(photoFile) photo_url = await uploadPhoto(profile.id, photoFile) || photo_url;
    const updates = {first_name:fn,surname:sn,photo_url};
    if(!isAdmin){
      Object.assign(updates,{dob,is_student:employment==="student",is_working:employment==="working",student_level:studentLevel,student_school:studentSchool,profession:prof,projects:projs});
    }
    const {error} = await sb.from("profiles").update(updates).eq("id",profile.id);
    setSaving(false);
    if(error){alert("Error: "+error.message); return;}
    onSave({...profile,...updates});
  }

  return <div style={{minHeight:"100vh",background:PL,fontFamily:BF}}>
    <header style={{background:DK,height:60,display:"flex",alignItems:"center",padding:"0 16px",gap:12,position:"sticky",top:0,zIndex:100}}>
      <button onClick={onBack} style={{background:"rgba(255,255,255,0.1)",color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:700}}>← Back</button>
      <span style={{fontFamily:HF,fontWeight:900,fontSize:16,color:"#fff",textTransform:"uppercase"}}>Edit Profile</span>
    </header>
    <main style={{maxWidth:640,margin:"0 auto",padding:"20px 16px 40px"}}>
      <div style={{background:"#fff",borderRadius:18,padding:"20px 16px",border:"1px solid "+BR}}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",paddingBottom:14,borderBottom:"1px solid "+BR}}>
            <PhotoEditor current={profile} onSelect={(f)=>setPhotoFile(f)}/>
          </div>
          <Field label="First Name"><input type="text" value={fn} onChange={e=>setFn(e.target.value)} style={inp}/></Field>
          <Field label="Surname"><input type="text" value={sn} onChange={e=>setSn(e.target.value)} style={inp}/></Field>
          {!isAdmin&&<>
            <Field label="Date of Birth"><input type="date" value={dob} onChange={e=>setDob(e.target.value)} style={inp}/></Field>
            <Field label="Employment Status">
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {[{val:"student",label:"🎓 Student"},{val:"working",label:"💼 Working"},{val:"not_working",label:"🏠 Not currently working"}].map(opt=><label key={opt.val} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"10px 12px",borderRadius:10,background:employment===opt.val?"#F0FDF4":"#fff",border:"1.5px solid "+(employment===opt.val?GN:BR)}}>
                  <input type="radio" name="edit_employment" value={opt.val} checked={employment===opt.val} onChange={e=>setEmployment(e.target.value)} style={{width:18,height:18,accentColor:GN}}/>
                  <span style={{fontSize:14,fontWeight:600,color:employment===opt.val?GN:DK}}>{opt.label}</span>
                </label>)}
              </div>
            </Field>
            {employment==="student"&&<div style={{display:"flex",flexDirection:"column",gap:10,padding:"14px",background:PL,borderRadius:12,border:"1px solid "+BR}}>
              <Field label="Level of study">
                <select value={studentLevel} onChange={e=>setStudentLevel(e.target.value)} style={inp}>
                  <option value="">Select...</option>
                  <option>Secondary School (GCSE)</option><option>Sixth Form / A-Levels</option>
                  <option>Undergraduate</option><option>Postgraduate</option><option>Other</option>
                </select>
              </Field>
              <Field label="School / University"><input type="text" value={studentSchool} onChange={e=>setStudentSchool(e.target.value)} style={inp}/></Field>
            </div>}
            {employment==="working"&&<div style={{padding:"14px",background:PL,borderRadius:12,border:"1px solid "+BR}}>
              <Field label="Profession"><input type="text" value={prof} onChange={e=>setProf(e.target.value)} style={inp}/></Field>
            </div>}
            <Field label="Project Interests">
              <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:4}}>
                {PROJECTS.map(p=><label key={p.id} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"10px 12px",borderRadius:10,background:projs.includes(p.id)?p.light:"#fff",border:"1.5px solid "+(projs.includes(p.id)?p.bg:BR)}}>
                  <input type="checkbox" checked={projs.includes(p.id)} onChange={()=>tp(p.id)} style={{width:18,height:18,accentColor:p.bg}}/>
                  <span style={{fontSize:18}}>{p.emoji}</span>
                  <span style={{fontSize:14,fontWeight:600,color:projs.includes(p.id)?p.text:DK}}>{p.label}</span>
                </label>)}
              </div>
            </Field>
          </>}
          <button onClick={save} disabled={saving} style={{background:DK,color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",opacity:saving?.7:1}}>{saving?"Saving...":"Save Changes"}</button>
        </div>
      </div>
    </main>
  </div>;
}

function Admin({profile:initProfile, onLogout, isSuperAdmin=true}){

  const [hourLogs,setHourLogs]=useState([]);
  const [toast,setToast]=useState(null);
  const [viewProf,setViewProf]=useState(null);
  const [editOpp,setEditOpp]=useState(null);
  const [editingProfile,setEditingProfile]=useState(false);

  const st=m=>{setToast(m);setTimeout(()=>setToast(null),3000);};

  const calcHours=(s,e)=>{
    if(!s||!e) return "";
    const [sh,sm]=s.split(":").map(Number);
    const [eh,em]=e.split(":").map(Number);
    const diff=(eh*60+em)-(sh*60+sm);
    return diff>0?(diff/60).toFixed(1).replace(".0",""):"";
  };

  useEffect(()=>{load();}, []);

  async function load(){
    const oppQuery = isSuperAdmin
      ? sb.from("opportunities").select("*").order("date")
      : sb.from("opportunities").select("*").in("project",profile.admin_projects||[]).order("date");
    const [{data:p},{data:v},{data:a},{data:o},{data:s},{data:h}] = await Promise.all([
      sb.from("profiles").select("*").eq("approved",false).eq("role","volunteer"),
      sb.from("profiles").select("*").eq("approved",true).eq("role","volunteer"),
      isSuperAdmin ? sb.from("profiles").select("*").in("role",["admin","superadmin"]) : Promise.resolve({data:[]}),
      oppQuery,
      sb.from("signups").select("*,profiles(id,first_name,surname,email,photo_url,is_student,student_level,student_school,is_working,profession,projects,approved,dob,role,admin_projects)"),
      sb.from("hour_logs").select("*,profiles(first_name,surname,email)").eq("status","pending").order("created_at",{ascending:false}),
    ]);
    setPending(p||[]); setVols(v||[]); setAdmins(a||[]); setOpps(o||[]);
    const g={};
    (s||[]).forEach(su=>{if(!g[su.opportunity_id])g[su.opportunity_id]=[];g[su.opportunity_id].push(su);});
    setOppSignups(g);
    setHoursPending(h||[]);
  }

  const approve=async id=>{
    const {error}=await sb.from("profiles").update({approved:true}).eq("id",id);
    if(error){st("Error: "+error.message);return;}
    const {data:vol}=await sb.from("profiles").select("first_name,email").eq("id",id).single();
    if(vol) await sendEmail("volunteer_approved",vol.first_name,vol.email);
    st("✓ Approved!"); load();
  };
  const decline=async id=>{
    const {error}=await sb.from("profiles").delete().eq("id",id);
    if(error){st("Error: "+error.message);return;}
    st("Declined."); load();
  };
  const deleteVol=async id=>{
    if(!window.confirm("Are you sure you want to delete this volunteer? This cannot be undone.")) return;
    await sb.from("signups").delete().eq("volunteer_id",id);
    await sb.from("hour_logs").delete().eq("volunteer_id",id);
    const {error}=await sb.from("profiles").delete().eq("id",id);
    if(error){st("Error: "+error.message);return;}
    await fetch(`https://xbxagukdvgyaoqvbqoic.supabase.co/auth/v1/admin/users/${id}`,{method:"DELETE",headers:{"Authorization":"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhieGFndWtkdmd5YW9xdmJxb2ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDExNDAsImV4cCI6MjA5NTYxNzE0MH0.-NifUdfkr9cZIDDtKNl5aQe9WMZab7l4boAJDAgfb-4","apikey":"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhieGFndWtkdmd5YW9xdmJxb2ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDExNDAsImV4cCI6MjA5NTYxNzE0MH0.-NifUdfkr9cZIDDtKNl5aQe9WMZab7l4boAJDAgfb-4"}});
    st("Volunteer removed."); load();
  };
  const approveSignup=async id=>{
    const {error}=await sb.from("signups").update({status:"approved"}).eq("id",id);
    if(error){st("Error: "+error.message);return;}
    st("✓ Signup approved!"); load();
  };
  const declineSignup=async id=>{
    const {error}=await sb.from("signups").delete().eq("id",id);

  const markDNA=async id=>{

    st("Marked as did not attend."); load();

  const checkIn=async id=>{

  </div>;
  if(editOpp) return <div style={{minHeight:"100vh",background:PL,fontFamily:BF}}>

      <button onClick={()=>setEditOpp(null)} style={{background:"rgba(255,255,255,0.1)",color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:700}}>← Back</button>

            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{fontWeight:700,fontSize:15,fontFamily:BF}}>{a.first_name} {a.surname}</div>
                <RoleBadge role={a.role}/>
              </div>
              <div style={{fontSize:12,color:MT}}>{a.email}</div>
            </div>
          </div>
          {a.role!=="superadmin"&&<div>
            <p style={{fontSize:12,fontWeight:700,color:DK,marginBottom:8,fontFamily:BF}}>Assigned Projects:</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {PROJECTS.map(p=>{
                const assigned=(a.admin_projects||[]).includes(p.id);
                return <button key={p.id} onClick={()=>{
                  const current=a.admin_projects||[];
                  const updated=assigned?current.filter(x=>x!==p.id):[...current,p.id];
                  updateAdminProjects(a.id,updated);
                }} style={{background:assigned?p.bg:"#fff",color:assigned?"#fff":DK,border:"1.5px solid "+(assigned?p.bg:BR),borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>{p.emoji} {p.label}</button>;
              })}
            </div>
          </div>}
        </div>)}
      </div>}

      {tab==="hours"&&<div>
        <h2 style={{fontFamily:HF,fontSize:16,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:12}}>Pending Hour Logs</h2>
        {hoursPending.length===0&&<p style={{color:MT,fontSize:14}}>No pending hour logs 🎉</p>}
        {hoursPending.map(l=><div key={l.id} style={{background:"#fff",borderRadius:14,padding:"14px 16px",border:"1px solid "+BR,marginBottom:10,borderLeft:"4px solid "+gp(l.project).bg}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div>
              <Tag pid={l.project} sm/>
              <div style={{fontWeight:700,fontSize:14,marginTop:6,fontFamily:BF}}>{l.activity}</div>
              <div style={{fontSize:12,color:MT,marginTop:2}}>{l.profiles?.first_name} {l.profiles?.surname} · {l.date} · {l.hours}h</div>
              {l.notes&&<div style={{fontSize:12,color:MT,marginTop:2,fontStyle:"italic"}}>"{l.notes}"</div>}
            </div>
            <div style={{display:"flex",gap:6,flexShrink:0,marginLeft:10}}>
              <button onClick={async()=>{await sb.from("hour_logs").update({status:"approved"}).eq("id",l.id);st("✓ Hours approved!");load();}} style={{background:MD,color:DK,border:"none",borderRadius:6,padding:"6px 12px",fontSize:13,fontWeight:700,cursor:"pointer"}}>✓</button>
              <button onClick={async()=>{await sb.from("hour_logs").delete().eq("id",l.id);st("Hours declined.");load();}} style={{background:"#FEE2E2",color:"#DC2626",border:"none",borderRadius:6,padding:"6px 12px",fontSize:13,fontWeight:700,cursor:"pointer"}}>✕</button>
            </div>
          </div>
        </div>)}
      </div>}

      {tab==="opps"&&<div>
        <h2 style={{fontFamily:HF,fontSize:16,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:12}}>Opportunities & Sign-ups</h2>
        {opps.map(o=>{
          const p=gp(o.project);
          const sups=oppSignups[o.id]||[];
          const pendingSups=sups.filter(s=>s.status==="pending");
          const approvedSups=sups.filter(s=>s.status==="approved");
          return <div key={o.id} style={{background:"#fff",borderRadius:14,padding:"14px 16px",border:"1px solid "+BR,marginBottom:12,borderLeft:"4px solid "+p.bg}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{flex:1}}>
                <Tag pid={o.project} sm/>
                {o.students_only&&<span style={{background:"#EDE9FE",color:"#5B21B6",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700,marginLeft:6}}>🎓 Students Only</span>}
                <div style={{fontWeight:700,fontSize:15,marginTop:6,color:DK,fontFamily:BF}}>{o.title}</div>
                <div style={{fontSize:12,color:MT,marginTop:2}}>📅 {o.date}{o.start_time?" · ⏰ "+o.start_time+(o.end_time?" – "+o.end_time:""):""} · 📍 {o.location} · {o.hours}h</div>
                <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
                  {pendingSups.length>0&&<span style={{background:"#FEF3C7",color:"#D97706",borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700}}>⏳ {pendingSups.length} pending</span>}
                  {approvedSups.length>0&&<span style={{background:"#DCFCE7",color:"#166534",borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700}}>✓ {approvedSups.length} approved</span>}
                </div>
              </div>
              <div style={{display:"flex",gap:6,marginLeft:10,flexShrink:0}}>
                <button onClick={()=>setEditOpp({...o})} style={{background:PL,color:DK,border:"1px solid "+BR,borderRadius:8,padding:"6px 10px",fontSize:12,cursor:"pointer",fontWeight:700}}>Edit</button>
                <button onClick={()=>delOpp(o.id,o.title,o.project)} style={{background:"#FEE2E2",color:"#DC2626",border:"none",borderRadius:8,padding:"6px 10px",fontSize:12,cursor:"pointer",fontWeight:700}}>Cancel Event</button>
              </div>
            </div>
            {sups.length>0&&<div style={{borderTop:"1px solid "+BR,paddingTop:10,marginTop:8}}>
              {sups.map(s=><div key={s.volunteer_id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #F0FDF4",flexWrap:"wrap"}}>
                <button onClick={()=>setViewProf(s.profiles)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:8,flex:1,textAlign:"left",padding:0}}>
                  <Avtr u={s.profiles} sz={32}/>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:DK,fontFamily:BF}}>{s.profiles?.first_name} {s.profiles?.surname}</div>
                    <div style={{fontSize:11,color:MT}}>{s.profiles?.email}</div>
                  </div>
                </button>
                {s.answers?.length>0&&<div style={{width:"100%",marginTop:4,marginLeft:40,background:PL,borderRadius:8,padding:"6px 10px"}}>
                  {s.answers.map((a,i)=><div key={i} style={{fontSize:11,color:DK,marginBottom:2}}>{a.question}: <strong>{a.answer||"—"}</strong></div>)}
                </div>}
                <div style={{display:"flex",gap:6,flexShrink:0}}>
                  {s.status==="pending"&&<div style={{display:"flex",gap:4}}>
                    <button onClick={()=>approveSignup(s.id)} style={{background:MD,color:DK,border:"none",borderRadius:6,padding:"6px 12px",fontSize:13,fontWeight:700,cursor:"pointer"}}>✓</button>
                    <button onClick={()=>declineSignup(s.id)} style={{background:"#FEE2E2",color:"#DC2626",border:"none",borderRadius:6,padding:"6px 12px",fontSize:13,fontWeight:700,cursor:"pointer"}}>✕</button>
                  </div>}
                  {s.status==="approved"&&!s.checked_in&&(()=>{
                    const now=new Date();
                    const eventDate=new Date(o.date+"T"+(o.start_time||"00:00")+":00");
                    const minsUntil=(eventDate-now)/60000;
                    const canCheckin=minsUntil<=30&&minsUntil>-((o.hours||2)*60+60);
                    return canCheckin?<div style={{display:"flex",gap:4}}>
                    <button onClick={()=>checkIn(s.id)} style={{background:"#DBEAFE",color:"#1D4ED8",border:"none",borderRadius:6,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>📍 In</button>
                    <button onClick={()=>markDNA(s.id)} style={{background:"#FEF3C7",color:"#D97706",border:"none",borderRadius:6,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>❌ DNA</button>
                    <button onClick={()=>declineSignup(s.id)} style={{background:"#FEE2E2",color:"#DC2626",border:"none",borderRadius:6,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Remove</button>
                  </div>:<span style={{fontSize:11,color:MT,fontFamily:BF}}>📅 {o.start_time||o.date}</span>;
                  })()}
                  {s.checked_in&&!s.checked_out&&!s.did_not_attend&&<button onClick={()=>checkOut(s.id,o.id,s.volunteer_id,o.title,o.project,o.hours)} style={{background:"#7C3AED",color:"#fff",border:"none",borderRadius:6,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>🏁 Check Out</button>}
                  {s.did_not_attend&&<span style={{fontSize:11,color:"#D97706",fontWeight:700,background:"#FEF3C7",padding:"3px 8px",borderRadius:20}}>❌ DNA</span>}
                  {s.checked_out&&<span style={{fontSize:11,color:"#7C3AED",fontWeight:700,background:"#F3E8FF",padding:"3px 8px",borderRadius:20}}>✅ {o.hours}h</span>}
                </div>
              </div>)}
            </div>}
          </div>;
        })}
      </div>}

      {tab==="add"&&<div>
        <h2 style={{fontFamily:HF,fontSize:16,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:16}}>Add New Opportunity</h2>
        <div style={{background:"#fff",borderRadius:18,padding:"20px 16px",border:"1px solid "+BR}}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Field label="Project"><select value={no.project} onChange={e=>setNo(n=>{return{...n,project:e.target.value};} )} style={inp}>{(isSuperAdmin?PROJECTS:PROJECTS.filter(p=>(profile.admin_projects||[]).includes(p.id))).map(p=><option key={p.id} value={p.id}>{p.emoji} {p.label}</option>)}</select></Field>
            <Field label="Title *"><input type="text" placeholder="e.g. Box Packing Day" value={no.title} onChange={e=>setNo(n=>{return{...n,title:e.target.value};} )} style={inp}/></Field>
            <Field label="Description"><textarea value={no.description} onChange={e=>setNo(n=>{return{...n,description:e.target.value};} )} rows={3} placeholder="What will volunteers do?" style={{...inp,resize:"vertical"}}/></Field>
            <Field label="Date *"><input type="date" value={no.date} onChange={e=>setNo(n=>{return{...n,date:e.target.value};} )} style={inp}/></Field>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Field label="Start Time"><input type="time" value={no.start_time} onChange={e=>{const h=calcHours(e.target.value,no.end_time);setNo(n=>{return{...n,start_time:e.target.value,hours:h||n.hours};} );}} style={inp}/></Field>
              <Field label="End Time"><input type="time" value={no.end_time} onChange={e=>{const h=calcHours(no.start_time,e.target.value);setNo(n=>{return{...n,end_time:e.target.value,hours:h||n.hours};} );}} style={inp}/></Field>
            </div>
            {no.start_time&&no.end_time&&no.hours&&<div style={{background:"#DCFCE7",borderRadius:10,padding:"10px 14px",fontSize:13,color:DK,fontWeight:600}}>⏱ Duration: <strong>{no.hours} hours</strong></div>}
            <Field label="Location *"><input type="text" placeholder="e.g. Feed a Friend HQ" value={no.location} onChange={e=>setNo(n=>{return{...n,location:e.target.value};} )} style={inp}/></Field>
            <Field label="Spots"><input type="number" placeholder="10" value={no.spots} onChange={e=>setNo(n=>{return{...n,spots:e.target.value};} )} style={inp}/></Field>
            <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"12px 14px",borderRadius:10,background:no.students_only?"#EDE9FE":"#F9FAFB",border:"1.5px solid "+(no.students_only?"#9B59B6":"#E5E7EB")}}>
              <input type="checkbox" checked={no.students_only} onChange={e=>setNo(n=>{return{...n,students_only:e.target.checked};} )} style={{width:18,height:18,accentColor:"#9B59B6"}}/>
              <div><div style={{fontWeight:700,fontSize:14,color:no.students_only?"#5B21B6":DK}}>🎓 Students Only</div></div>
            </label>
            <div style={{borderTop:"1px solid "+BR,paddingTop:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <label style={{fontWeight:700,fontSize:13,color:DK}}>Qualifying Questions</label>
                <button onClick={()=>setNo(n=>{return{...n,questions:[...n.questions,{q:"",type:"text"}]};} )} style={{background:PL,color:DK,border:"1px solid "+BR,borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Add</button>
              </div>
              {no.questions.map((q,i)=><div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                <input type="text" placeholder={`Question ${i+1}...`} value={q.q} onChange={e=>setNo(n=>{const qs=[...n.questions];qs[i]={...qs[i],q:e.target.value};return{...n,questions:qs};} )} style={{...inp,flex:1}}/>
                <select value={q.type} onChange={e=>setNo(n=>{const qs=[...n.questions];qs[i]={...qs[i],type:e.target.value};return{...n,questions:qs};} )} style={{...inp,width:"auto",padding:"12px 8px"}}>
                  <option value="text">Text</option>
                  <option value="yesno">Yes/No</option>
                </select>
                <button onClick={()=>setNo(n=>{return{...n,questions:n.questions.filter((_,j)=>j!==i)};} )} style={{background:"#FEE2E2",color:"#DC2626",border:"none",borderRadius:8,padding:"10px 12px",cursor:"pointer",fontWeight:700}}>✕</button>
              </div>)}
              {no.questions.length===0&&<p style={{fontSize:12,color:MT,fontStyle:"italic"}}>No questions — volunteers sign up directly.</p>}
            </div>
            <button onClick={addOpp} style={{background:DK,color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer"}}>Publish Opportunity</button>
          </div>
        </div>
      </div>}
    </main>
  </div>;
}

// ── VOLUNTEER ─────────────────────────────────────────────────────────────────
function Volunteer({profile:initProfile, onLogout, onUpdateProfile}){
  const [profile,setProfile]=useState(initProfile);
  const [view,setView]=useState("dashboard");
  const [logs,setLogs]=useState([]);
  const [opps,setOpps]=useState([]);
  const [su,setSu]=useState([]);
  const [fp,setFp]=useState("all");
  const [form,setForm]=useState({activity:"",hours:"",date:"",project:"food-boxes",notes:""});
  const [toast,setToast]=useState(null);
  const [signupModal,setSignupModal]=useState(null);
  const [answers,setAnswers]=useState({});
  const [editingProfile,setEditingProfile]=useState(false);
  const st=m=>{setToast(m);setTimeout(()=>setToast(null),3000);};

  useEffect(()=>{loadData();}, []);

  async function loadData(){
    const [{data:o},{data:l},{data:s}]=await Promise.all([
      sb.from("opportunities").select("*").order("date"),
      sb.from("hour_logs").select("*").eq("volunteer_id",profile.id).order("created_at",{ascending:false}),
      sb.from("signups").select("opportunity_id,status,checked_in,checked_out").eq("volunteer_id",profile.id),
    ]);
    setOpps(o||[]); setLogs(l||[]); setSu(s||[]);
  }

  async function submitLog(){
    if(!form.activity||!form.hours||!form.date) return;
    await sb.from("hour_logs").insert({...form,hours:Number(form.hours),volunteer_id:profile.id,approved:false});
    setForm({activity:"",hours:"",date:"",project:"food-boxes",notes:""}); st("✓ Hours submitted for admin approval!"); loadData();
  }

  async function signUp(o){
    if(su.find(x=>x.opportunity_id===o.id)) return;
    if(o.questions&&o.questions.length>0){setSignupModal(o);setAnswers({});}
    else await submitSignup(o,[]);
  }

  async function cancelSignup(opportunityId){
    await sb.from("signups").delete().eq("volunteer_id",profile.id).eq("opportunity_id",opportunityId);
    st("Signup cancelled."); loadData();
  }

  async function submitSignup(o,answersArr){
    await sb.from("signups").insert({volunteer_id:profile.id,opportunity_id:o.id,status:"pending",answers:answersArr});
    setSignupModal(null); setAnswers({});
    st("✓ Request sent! Awaiting admin approval."); loadData();
  }

  const approvedLogs=logs.filter(l=>l.approved!==false); const th=approvedLogs.reduce((s,l)=>s+Number(l.hours),0);
  const visibleOpps=opps.filter(o=>!o.students_only||profile.is_student);
  const fo=fp==="all"?visibleOpps:visibleOpps.filter(o=>o.project===fp);
  const NAV=[{id:"dashboard",label:"Home"},{id:"opportunities",label:"Opportunities"},{id:"log",label:"Log Hours"},{id:"history",label:"My Hours"}];

  if(editingProfile) return <ProfileEdit profile={profile} onSave={p=>{
    setProfile(p); onUpdateProfile(p); setEditingProfile(false); st("✓ Profile saved!");
  }} onBack={()=>setEditingProfile(false)}/>;

  return <div style={{minHeight:"100vh",background:PL,fontFamily:BF}}>
    <header style={{background:DK,height:60,display:"flex",alignItems:"center",padding:"0 14px",position:"sticky",top:0,zIndex:100,gap:12,boxShadow:"0 2px 8px rgba(0,0,0,.3)"}}>
      <button onClick={()=>setView("dashboard")} style={{background:"none",border:"none",cursor:"pointer",padding:0,flexShrink:0}}>
        <img src={LOGO} alt="Feed a Friend" style={{height:42,display:"block"}}/>
      </button>
      <nav style={{display:"flex",gap:2,flex:1,justifyContent:"flex-end",alignItems:"center"}}>
        {NAV.map(n=><button key={n.id} onClick={()=>setView(n.id)} style={{background:view===n.id?MD:"transparent",color:view===n.id?DK:"#BBF7D0",border:"none",borderRadius:8,padding:"6px 9px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{n.label}</button>)}
        <button onClick={onLogout} style={{background:"#DC2626",color:"#fff",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,marginLeft:4}}>Sign Out</button>
      </nav>
    </header>
    <Toast msg={toast}/>
    <main style={{maxWidth:640,margin:"0 auto",padding:"16px 14px 40px"}}>

      {view==="dashboard"&&<div className="fade">
        <div style={{background:DK,borderRadius:18,padding:"22px 18px",marginBottom:16,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",right:-10,top:-10,fontSize:100,opacity:.05}}>🥦</div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <Avtr u={profile} sz={46}/>
            <p style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#86EFAC",fontFamily:BF}}>Welcome back, {profile.first_name}!</p>
          </div>
          <h1 style={{fontFamily:HF,fontSize:30,fontWeight:900,textTransform:"uppercase",color:"#fff",lineHeight:1.05,marginBottom:16}}>Together<br/>for Good</h1>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <button onClick={()=>setView("opportunities")} style={{background:MD,color:DK,border:"none",borderRadius:10,padding:"10px 16px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:BF}}>Find Opportunities →</button>
            <button onClick={()=>setView("log")} style={{background:"rgba(255,255,255,.12)",color:"#fff",border:"1.5px solid rgba(255,255,255,.25)",borderRadius:10,padding:"10px 16px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:BF}}>Log Hours</button>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
          {[{label:"Total Hours",value:th,sub:"hrs given",color:GN},{label:"Activities",value:logs.length,sub:"logged",color:"#7C3AED"},{label:"Signups",value:su.length,sub:"total",color:"#E8732A"}].map(s=><div key={s.label} style={{background:"#fff",borderRadius:14,padding:"12px 10px",border:"1px solid "+BR,borderTop:"4px solid "+s.color}}>
            <div style={{fontSize:26,fontWeight:900,color:s.color,fontFamily:HF,lineHeight:1}}>{s.value}</div>
            <div style={{fontSize:10,color:MT,textTransform:"uppercase",letterSpacing:.5,marginTop:2}}>{s.sub}</div>
            <div style={{fontSize:11,fontWeight:600,color:DK,marginTop:3}}>{s.label}</div>
          </div>)}
        </div>
        <h2 style={{fontFamily:HF,fontSize:17,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:10}}>Upcoming Events</h2>
        <div style={{marginBottom:16}}>
          {su.filter(s=>s.status==="approved"&&!s.checked_out).length===0
            ? <div style={{background:"#fff",borderRadius:14,padding:20,border:"1px solid "+BR,textAlign:"center",color:MT,fontSize:13,fontFamily:BF}}>No upcoming events — <span onClick={()=>setView("opportunities")} style={{color:GN,fontWeight:700,cursor:"pointer"}}>browse opportunities</span></div>
            : su.filter(s=>s.status==="approved"&&!s.checked_out).map(s=>{
                const o=opps.find(x=>x.id===s.opportunity_id); if(!o) return null;
                const p=gp(o.project);
                return <div key={s.opportunity_id} style={{background:"#fff",borderRadius:14,padding:"12px 14px",border:"1px solid "+BR,borderLeft:"4px solid "+p.bg,marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:36,height:36,borderRadius:10,background:p.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{p.emoji}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,fontFamily:BF,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{o.title}</div>
                    <div style={{fontSize:11,color:MT,fontFamily:BF}}>📅 {o.date}{o.start_time?" · ⏰ "+o.start_time:""} · 📍 {o.location}</div>
                  </div>
                  <span style={{fontSize:11,background:"#DCFCE7",color:"#166534",borderRadius:20,padding:"3px 8px",fontWeight:700,flexShrink:0}}>✓ Approved</span>
                </div>;
              })
          }
        </div>
        <h2 style={{fontFamily:HF,fontSize:17,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:10}}>Our Projects</h2>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          {PROJECTS.map(p=><button key={p.id} className="card" onClick={()=>{setView("opportunities");setFp(p.id);}} style={{background:p.bg,border:"none",borderRadius:14,padding:"14px 12px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:26,flexShrink:0}}>{p.emoji}</span>
            <div>
              <div style={{fontWeight:700,fontSize:13,color:"#fff",lineHeight:1.3,fontFamily:BF}}>{p.label}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.75)",marginTop:2,fontFamily:BF}}>{visibleOpps.filter(o=>o.project===p.id).length} opportunities</div>
            </div>
          </button>)}
        </div>
        <h2 style={{fontFamily:HF,fontSize:17,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:10}}>Recent Activity</h2>
        <div style={{background:"#fff",borderRadius:14,overflow:"hidden",border:"1px solid "+BR}}>
          {logs.length===0&&<p style={{padding:24,color:MT,textAlign:"center",fontFamily:BF}}>No hours logged yet.</p>}

          <button onClick={()=>setFp("all")} style={{padding:"5px 12px",borderRadius:20,border:"2px solid "+(fp==="all"?GN:BR),background:fp==="all"?GN:"#fff",color:fp==="all"?"#fff":DK,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:BF}}>All</button>

        <p style={{color:MT,fontSize:13,marginBottom:18,fontFamily:BF}}>Every hour counts — thank you!</p>
        <div style={{background:"#fff",borderRadius:18,padding:"20px 16px",border:"1px solid "+BR}}>

            <Field label="Project"><select value={form.project} onChange={e=>setForm(f=>{return{...f,project:e.target.value};} )} style={inp}>{PROJECTS.map(p=><option key={p.id} value={p.id}>{p.emoji} {p.label}</option>)}</select></Field>

            <Field label="Hours Volunteered"><input type="number" placeholder="e.g. 3" value={form.hours} onChange={e=>setForm(f=>{return{...f,hours:e.target.value};} )} style={inp}/></Field>

            <button onClick={submitLog} style={{background:DK,color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:BF}}>Submit Hours 🌿</button>

          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{position:"relative",cursor:"pointer"}} onClick={()=>setEditingProfile(true)}>
              <Avtr u={profile} sz={58}/>
              <div style={{position:"absolute",bottom:0,right:0,background:DK,borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,border:"2px solid #fff"}}>📷</div>
            </div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <div style={{fontFamily:HF,fontWeight:900,fontSize:17,color:DK}}>{profile.first_name} {profile.surname}</div>
                <RoleBadge role={profile.role}/>
              </div>
              <div style={{fontSize:12,color:MT,fontFamily:BF}}>{profile.email}</div>
              <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
                {profile.is_student&&<span style={{background:"#EDE9FE",color:"#5B21B6",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>🎓 {profile.student_level||"Student"}{profile.student_school?" · "+profile.student_school:""}</span>}

              </div>
            </div>
            <button onClick={()=>setEditingProfile(true)} style={{background:PL,color:DK,border:"1px solid "+BR,borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:BF,flexShrink:0}}>Edit</button>
          </div>
        </div>
        <h1 style={{fontFamily:HF,fontSize:24,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:4}}>My Hours</h1>
        <p style={{color:MT,fontSize:13,marginBottom:14,fontFamily:BF}}>{th} hours across {logs.length} activities.</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
          {PROJECTS.map(p=>{const h=logs.filter(l=>l.project===p.id).reduce((s,l)=>s+Number(l.hours),0);if(!h) return null;return <div key={p.id} style={{background:p.bg,color:"#fff",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:700}}>{p.emoji} {h}h {p.label}</div>;})}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {logs.map(l=>{const p=gp(l.project);return <div key={l.id} style={{background:"#fff",borderRadius:14,padding:"12px 14px",border:"1px solid "+BR,borderLeft:"5px solid "+p.bg,display:"flex",alignItems:"center",gap:12}}>

            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:13,fontFamily:BF,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{l.activity}</div>

            </div>
            <div style={{fontWeight:900,fontSize:22,color:p.bg,fontFamily:HF,flexShrink:0}}>{l.hours}h</div>
          </div>;})}
          {logs.length===0&&<p style={{padding:28,textAlign:"center",color:MT,fontFamily:BF,background:"#fff",borderRadius:14}}>No hours yet — go volunteer!</p>}
        </div>
      </div>}
    </main>

    {signupModal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:999,display:"flex",alignItems:"flex-end"}}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"24px 20px",width:"100%",maxHeight:"80vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{fontFamily:HF,fontSize:18,fontWeight:900,textTransform:"uppercase",color:DK}}>Sign Up</h2>
          <button onClick={()=>setSignupModal(null)} style={{background:"#F3F4F6",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13}}>✕</button>
        </div>
        <p style={{fontSize:13,color:MT,marginBottom:16,fontFamily:BF}}>Please answer these questions to apply for <strong style={{color:DK}}>{signupModal.title}</strong></p>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {signupModal.questions.map((q,i)=><div key={i}>
            <label style={{display:"block",fontWeight:700,fontSize:13,color:DK,marginBottom:6,fontFamily:BF}}>{i+1}. {q.q}</label>
            {q.type==="yesno"
              ? <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setAnswers(a=>{return{...a,[i]:"Yes"};} )} style={{flex:1,padding:"10px",borderRadius:10,border:"2px solid "+(answers[i]==="Yes"?"#22C55E":BR),background:answers[i]==="Yes"?"#DCFCE7":"#fff",fontWeight:700,cursor:"pointer",fontSize:14}}>✓ Yes</button>
                  <button onClick={()=>setAnswers(a=>{return{...a,[i]:"No"};} )} style={{flex:1,padding:"10px",borderRadius:10,border:"2px solid "+(answers[i]==="No"?"#DC2626":"#E5E7EB"),background:answers[i]==="No"?"#FEE2E2":"#fff",fontWeight:700,cursor:"pointer",fontSize:14}}>✕ No</button>
                </div>
              : <input type="text" placeholder="Your answer..." value={answers[i]||""} onChange={e=>setAnswers(a=>{return{...a,[i]:e.target.value};} )} style={inp}/>
            }
          </div>)}
        </div>
        <button onClick={()=>{
          const arr=signupModal.questions.map((q,i)=>{return{question:q.q,answer:answers[i]||""};} );
          submitSignup(signupModal,arr);
        }} style={{background:DK,color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",width:"100%",marginTop:20,fontFamily:BF}}>Submit Application →</button>
      </div>
    </div>}
  </div>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [profile,setProfile]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    sb.auth.getSession().then(async({data:{session}})=>{
      if(session){
        const {data}=await sb.from("profiles").select("*").eq("id",session.user.id).single();
        setProfile(data);
      }
      setLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange(event=>{
      if(event==="SIGNED_OUT") setProfile(null);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  const logout=async()=>{await sb.auth.signOut();setProfile(null);};

  if(loading) return <div style={{minHeight:"100vh",background:DK,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div className="spinner"/>
  </div>;
  if(!profile) return <Auth onAuth={p=>setProfile(p)}/>;
  if(profile.role==="superadmin") return <Admin profile={profile} onLogout={logout} isSuperAdmin={true}/>;
  if(profile.role==="admin") return <Admin profile={profile} onLogout={logout} isSuperAdmin={false}/>;
  return <Volunteer profile={profile} onLogout={logout} onUpdateProfile={setProfile}/>;
}

document.getElementById("splash").style.display="none";
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>

<script>
let deferredPrompt;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault(); deferredPrompt=e;
  const b=document.createElement("div");
  b.style="position:fixed;bottom:0;left:0;right:0;background:#0A3D1F;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:9999;box-shadow:0 -4px 20px rgba(0,0,0,.3)";
  b.innerHTML=`<div style="display:flex;align-items:center;gap:10px"><img src="https://xbxagukdvgyaoqvbqoic.supabase.co/storage/v1/object/public/avatars/Faflogowhite.png" style="height:36px"/><div><div style="font-weight:700;font-size:14px;color:#fff;font-family:Poppins,sans-serif">Feed a Friend</div><div style="font-size:11px;color:#BBF7D0;font-family:Poppins,sans-serif">Add to your home screen</div></div></div><div style="display:flex;gap:8px"><button onclick="deferredPrompt.prompt();this.closest('div').remove()" style="background:#22C55E;color:#0A3D1F;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:Poppins,sans-serif">Install</button><button onclick="this.closest('div').remove()" style="background:rgba(255,255,255,0.15);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer">✕</button></div>`;
  document.body.appendChild(b);
});
</script>
