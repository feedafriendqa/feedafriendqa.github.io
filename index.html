<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Feed a Friend — Volunteer Portal</title>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<meta name="theme-color" content="#0A3D1F"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Feed a Friend"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A3D1F;font-family:Poppins,sans-serif;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade{animation:fadein .2s ease}
.card{transition:transform .15s,box-shadow .15s}
.card:active{transform:scale(0.98)}
#splash{position:fixed;inset:0;background:#0A3D1F;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999}
.spinner{width:40px;height:40px;border:4px solid #22C55E;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>
<div id="splash">
  <div class="spinner"></div>
  <p style="color:#BBF7D0;font-size:12px;letter-spacing:2px">LOADING...</p>
</div>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const {useState, useEffect} = React;
const sb = supabase.createClient(
  "https://xbxagukdvgyaoqvbqoic.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhieGFndWtkdmd5YW9xdmJxb2ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDExNDAsImV4cCI6MjA5NTYxNzE0MH0.-NifUdfkr9cZIDDtKNl5aQe9WMZab7l4boAJDAgfb-4"
);

const LOGO = "https://xbxagukdvgyaoqvbqoic.supabase.co/storage/v1/object/public/avatars/Faflogowhite.png";
const EDGE = "https://xbxagukdvgyaoqvbqoic.supabase.co/functions/v1/clever-responder";
const DK="#0A3D1F", GN="#15803D", MD="#22C55E", PL="#F0FDF4", BR="#BBF7D0", MT="#4B7C5A";
const HF="'League Spartan',sans-serif", BF="'Poppins',sans-serif";

const PROJECTS = [
  {id:"food-boxes",       label:"Food Boxes",        emoji:"📦", bg:"#F5A623", light:"#FEF3C7", text:"#7C4D00"},
  {id:"welcome-baby",     label:"Welcome Baby",       emoji:"👶", bg:"#9B59B6", light:"#F3E8FF", text:"#5B21B6"},
  {id:"community-fridges",label:"Community Fridges",  emoji:"🧊", bg:"#E8732A", light:"#FFEDD5", text:"#9A3412"},
  {id:"little-learners",  label:"Little Learners",    emoji:"📚", bg:"#1A9E8F", light:"#CCFBF1", text:"#134E4A"},
  {id:"pay-it-forward",   label:"Pay it Forward",     emoji:"🎁", bg:"#E74C3C", light:"#FEE2E2", text:"#991B1B"},
  {id:"giving-garden",    label:"Giving Garden",      emoji:"🌱", bg:"#8E44AD", light:"#EDE9FE", text:"#4C1D95"},
];

const gp = id => PROJECTS.find(p => p.id === id) || PROJECTS[0];
const inp = {width:"100%",padding:"12px 14px",border:"1.5px solid #BBF7D0",borderRadius:10,fontSize:15,fontFamily:BF,outline:"none",boxSizing:"border-box",background:"#fff",color:DK};

async function sendEmail(type, name, email, adminEmail="") {
  try { await fetch(EDGE, {method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhieGFndWtkdmd5YW9xdmJxb2ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDExNDAsImV4cCI6MjA5NTYxNzE0MH0.-NifUdfkr9cZIDDtKNl5aQe9WMZab7l4boAJDAgfb-4"},body:JSON.stringify({type,name,email,adminEmail})}); }
  catch(e) { console.log("Email error:", e); }
}

function Tag({pid, sm}) {
  const p = gp(pid);
  return <span style={{background:p.light,color:p.text,padding:sm?"2px 8px":"3px 10px",borderRadius:20,fontSize:sm?10:11,fontWeight:700,display:"inline-flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}>{p.emoji} {p.label}</span>;
}

function Avtr({u, sz=40}) {
  if (u?.photo_url) return <img src={u.photo_url} style={{width:sz,height:sz,borderRadius:"50%",objectFit:"cover",flexShrink:0,border:"2px solid "+MD}}/>;
  const i = (u?.first_name?.[0]||"")+(u?.surname?.[0]||"");
  return <div style={{width:sz,height:sz,borderRadius:"50%",background:MD,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:HF,fontWeight:900,fontSize:sz*.35,color:DK,flexShrink:0}}>{i}</div>;
}

function Field({label, children}) {
  return <div><label style={{display:"block",fontWeight:700,fontSize:13,color:DK,marginBottom:6,fontFamily:BF}}>{label}</label>{children}</div>;
}

function Toast({msg}) {
  if (!msg) return null;
  return <div style={{position:"fixed",top:68,left:12,right:12,background:DK,color:"#fff",padding:"12px 16px",borderRadius:12,zIndex:999,fontSize:14,fontWeight:600,textAlign:"center",border:"1px solid "+MD,fontFamily:BF}}>{msg}</div>;
}

// ── AUTH ──────────────────────────────────────────────────────
function Auth({onAuth}) {
  const [mode, setMode] = useState("login");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(""), [msg, setMsg] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [em, setEm] = useState(""), [pw, setPw] = useState("");
  const [r, setR] = useState({fn:"",sn:"",dob:"",email:"",pw:"",pw2:"",student:false,studentLevel:"",studentSchool:"",working:false,prof:"",projs:[],photo:null});

  async function login() {
    setErr(""); setLoading(true);
    const {data, error} = await sb.auth.signInWithPassword({email:em, password:pw});
    if (error) { setErr(error.message); setLoading(false); return; }
    const {data:p} = await sb.from("profiles").select("*").eq("id",data.user.id).single();
    if (p && !p.approved && p.role !== "admin") { await sb.auth.signOut(); setErr("Your registration is pending admin approval."); setLoading(false); return; }
    onAuth(p); setLoading(false);
  }

  async function register() {
    setErr("");
    if (!r.fn||!r.sn||!r.dob||!r.email||!r.pw) { setErr("Please fill in all required fields."); return; }
    if (r.pw !== r.pw2) { setErr("Passwords do not match."); return; }
    if (r.pw.length < 6) { setErr("Password must be at least 6 characters."); return; }
    setLoading(true);
    const {data, error} = await sb.auth.signUp({email:r.email, password:r.pw});
    if (error) { setErr(error.message); setLoading(false); return; }
    let photo_url = null;
    if (r.photo && data.user) {
      const res = await fetch(r.photo); const blob = await res.blob();
      const {data:up} = await sb.storage.from("avatars").upload(data.user.id+"/avatar."+blob.type.split("/")[1], blob, {upsert:true});
      if (up) { const {data:u} = sb.storage.from("avatars").getPublicUrl(up.path); photo_url = u.publicUrl; }
    }
    await sb.from("profiles").insert({id:data.user.id,first_name:r.fn,surname:r.sn,email:r.email,dob:r.dob,is_student:r.student,student_level:r.studentLevel,student_school:r.studentSchool,is_working:r.working,profession:r.prof,projects:r.projs,photo_url,role:"volunteer",approved:false});
    await sendEmail("volunteer_pending", r.fn, r.email);
    await sendEmail("new_volunteer", r.fn+" "+r.sn, r.email, "salaam@feedafriend.org");
    setMsg("Registration submitted! An admin will review and approve your account shortly."); setMode("login"); setLoading(false);
  }

  async function forgot() {
    if (!em) { setErr("Please enter your email."); return; }
    await sb.auth.resetPasswordForEmail(em, {redirectTo:window.location.href});
    setMsg("Reset email sent! Check your inbox."); setMode("login");
  }

  const tp = id => setR(x => ({...x, projs:x.projs.includes(id)?x.projs.filter(p=>p!==id):[...x.projs,id]}));
  const card = {background:"#fff",borderRadius:20,padding:"28px 22px",width:"100%",maxWidth:420};

  return (
    <div className="fade" style={{minHeight:"100vh",background:DK,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 16px",fontFamily:BF}}>
      <img src={LOGO} alt="Feed a Friend" style={{height:70,marginBottom:6}}/>
      <p style={{fontSize:11,color:MD,letterSpacing:2,textTransform:"uppercase",marginBottom:20}}>Volunteer Portal</p>
      {msg && <div style={{background:"#DCFCE7",color:DK,borderRadius:12,padding:"12px 16px",marginBottom:16,fontSize:13,width:"100%",maxWidth:420,textAlign:"center",fontWeight:600}}>{msg}</div>}

      {mode==="login" && <div style={card}>
        <h2 style={{fontFamily:HF,fontSize:22,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:4}}>Sign In</h2>
        <p style={{color:MT,fontSize:13,marginBottom:20}}>Welcome back!</p>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Field label="Email"><input type="email" placeholder="you@email.com" value={em} onChange={e=>setEm(e.target.value)} style={inp}/></Field>
          <Field label="Password">
            <div style={{position:"relative"}}>
              <input type={showPw?"text":"password"} placeholder="••••••••" value={pw} onChange={e=>setPw(e.target.value)} style={{...inp,paddingRight:50}}/>
              <button onClick={()=>setShowPw(s=>!s)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:12,color:MT}}>{showPw?"Hide":"Show"}</button>
            </div>
          </Field>
          {err && <p style={{color:"#DC2626",fontSize:13,fontWeight:600}}>{err}</p>}
          <button onClick={login} disabled={loading} style={{background:MD,color:DK,border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",opacity:loading?.7:1}}>{loading?"Signing in...":"Sign In →"}</button>
          <button onClick={()=>{setMode("forgot");setErr("");}} style={{background:"none",border:"none",color:MT,fontSize:13,cursor:"pointer",textDecoration:"underline"}}>Forgot password?</button>
        </div>
        <div style={{borderTop:"1px solid "+BR,marginTop:20,paddingTop:16,textAlign:"center"}}>
          <p style={{fontSize:13,color:MT}}>New volunteer? <span onClick={()=>{setMode("register");setErr("");}} style={{color:GN,fontWeight:700,cursor:"pointer"}}>Register here</span></p>
        </div>
      </div>}

      {mode==="forgot" && <div style={card}>
        <h2 style={{fontFamily:HF,fontSize:22,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:4}}>Reset Password</h2>
        <p style={{color:MT,fontSize:13,marginBottom:20}}>Enter your email for a reset link.</p>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Field label="Email"><input type="email" placeholder="you@email.com" value={em} onChange={e=>setEm(e.target.value)} style={inp}/></Field>
          {err && <p style={{color:"#DC2626",fontSize:13,fontWeight:600}}>{err}</p>}
          <button onClick={forgot} style={{background:MD,color:DK,border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer"}}>Send Reset Link</button>
          <button onClick={()=>setMode("login")} style={{background:"none",border:"none",color:MT,fontSize:13,cursor:"pointer",textDecoration:"underline"}}>← Back to Sign In</button>
        </div>
      </div>}

      {mode==="register" && <div style={{...card,maxHeight:"85vh",overflowY:"auto"}}>
        <h2 style={{fontFamily:HF,fontSize:22,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:4}}>Register</h2>
        <p style={{color:MT,fontSize:13,marginBottom:20}}>Join our volunteer community.</p>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Field label="Profile Photo">
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
              {r.photo ? <img src={r.photo} style={{width:80,height:80,borderRadius:"50%",objectFit:"cover",border:"3px solid "+MD}}/> : <div style={{width:80,height:80,borderRadius:"50%",background:PL,border:"2px dashed "+BR,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>👤</div>}
              <label style={{background:DK,color:"#fff",borderRadius:10,padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                {r.photo?"Change Photo":"Upload Photo"}
                <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>setR(x=>({...x,photo:ev.target.result}));rd.readAsDataURL(f);}}/>
              </label>
              {r.photo && <button onClick={()=>setR(x=>({...x,photo:null}))} style={{background:"none",border:"none",color:MT,fontSize:12,cursor:"pointer",textDecoration:"underline"}}>Remove</button>}
            </div>
          </Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="First Name *"><input type="text" placeholder="Sara" value={r.fn} onChange={e=>setR(x=>({...x,fn:e.target.value}))} style={inp}/></Field>
            <Field label="Surname *"><input type="text" placeholder="Ahmed" value={r.sn} onChange={e=>setR(x=>({...x,sn:e.target.value}))} style={inp}/></Field>
          </div>
          <Field label="Date of Birth *"><input type="date" value={r.dob} onChange={e=>setR(x=>({...x,dob:e.target.value}))} style={inp}/></Field>
          <Field label="Email *"><input type="email" placeholder="you@email.com" value={r.email} onChange={e=>setR(x=>({...x,email:e.target.value}))} style={inp}/></Field>
          <Field label="Password *"><input type="password" placeholder="Min. 6 characters" value={r.pw} onChange={e=>setR(x=>({...x,pw:e.target.value}))} style={inp}/></Field>
          <Field label="Confirm Password *"><input type="password" placeholder="Repeat password" value={r.pw2} onChange={e=>setR(x=>({...x,pw2:e.target.value}))} style={inp}/></Field>
          <div style={{background:PL,borderRadius:12,padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>
            <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:14,fontWeight:600,color:DK}}>
              <input type="checkbox" checked={r.student} onChange={e=>setR(x=>({...x,student:e.target.checked}))} style={{width:18,height:18,accentColor:GN}}/>Are you a student?
            </label>
            {r.student && <div style={{display:"flex",flexDirection:"column",gap:10,paddingLeft:28}}>
              <Field label="Level of study">
                <select value={r.studentLevel} onChange={e=>setR(x=>({...x,studentLevel:e.target.value}))} style={inp}>
                  <option value="">Select level...</option>
                  <option>Secondary School (GCSE)</option>
                  <option>Sixth Form / A-Levels</option>
                  <option>Undergraduate</option>
                  <option>Postgraduate</option>
                  <option>Other</option>
                </select>
              </Field>
              <Field label="School / University name"><input type="text" placeholder="e.g. University of Manchester" value={r.studentSchool} onChange={e=>setR(x=>({...x,studentSchool:e.target.value}))} style={inp}/></Field>
            </div>}
            <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:14,fontWeight:600,color:DK}}>
              <input type="checkbox" checked={r.working} onChange={e=>setR(x=>({...x,working:e.target.checked}))} style={{width:18,height:18,accentColor:GN}}/>Are you currently working?
            </label>
            {r.working && <Field label="Profession"><input type="text" placeholder="e.g. Teacher, Nurse..." value={r.prof} onChange={e=>setR(x=>({...x,prof:e.target.value}))} style={inp}/></Field>}
          </div>
          <Field label="Projects you're interested in">
            <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:4}}>
              {PROJECTS.map(p => <label key={p.id} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"10px 12px",borderRadius:10,background:r.projs.includes(p.id)?p.light:"#fff",border:"1.5px solid "+(r.projs.includes(p.id)?p.bg:BR),transition:"all .15s"}}>
                <input type="checkbox" checked={r.projs.includes(p.id)} onChange={()=>tp(p.id)} style={{width:18,height:18,accentColor:p.bg}}/>
                <span style={{fontSize:18}}>{p.emoji}</span>
                <span style={{fontSize:14,fontWeight:600,color:r.projs.includes(p.id)?p.text:DK}}>{p.label}</span>
              </label>)}
            </div>
          </Field>
          {err && <p style={{color:"#DC2626",fontSize:13,fontWeight:600}}>{err}</p>}
          <button onClick={register} disabled={loading} style={{background:DK,color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",opacity:loading?.7:1}}>{loading?"Submitting...":"Submit Registration"}</button>
          <button onClick={()=>{setMode("login");setErr("");}} style={{background:"none",border:"none",color:MT,fontSize:13,cursor:"pointer",textDecoration:"underline"}}>← Back to Sign In</button>
        </div>
      </div>}
      <p style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:20}}>feedafriend.org · Volunteer Portal</p>
    </div>
  );
}

// ── ADMIN ─────────────────────────────────────────────────────
function Admin({profile, onLogout}) {
  const [tab, setTab] = useState("pending");
  const [pending, setPending] = useState([]);
  const [vols, setVols] = useState([]);
  const [opps, setOpps] = useState([]);
  const [oppSignups, setOppSignups] = useState({});
  const [toast, setToast] = useState(null);
  const [viewProf, setViewProf] = useState(null);
  const [no, setNo] = useState({title:"",project:"food-boxes",date:"",spots:"",hours:"",location:"",description:""});
  const st = m => { setToast(m); setTimeout(()=>setToast(null),3000); };

  useEffect(()=>{ load(); },[]);

  async function load() {
    const [{data:p},{data:v},{data:o},{data:s}] = await Promise.all([
      sb.from("profiles").select("*").eq("approved",false).eq("role","volunteer"),
      sb.from("profiles").select("*").eq("approved",true).eq("role","volunteer"),
      sb.from("opportunities").select("*").order("date"),
      sb.from("signups").select("*,profiles(id,first_name,surname,email,photo_url,is_student,student_level,student_school,is_working,profession,projects,approved,dob)"),
    ]);
    setPending(p||[]); setVols(v||[]); setOpps(o||[]);
    const grouped = {};
    (s||[]).forEach(su => { if(!grouped[su.opportunity_id])grouped[su.opportunity_id]=[]; grouped[su.opportunity_id].push(su); });
    setOppSignups(grouped);
  }

  const approve = async id => { await sb.from("profiles").update({approved:true}).eq("id",id); const {data:vol}=await sb.from("profiles").select("first_name,email").eq("id",id).single(); if(vol) await sendEmail("volunteer_approved",vol.first_name,vol.email); st("✓ Approved!"); load(); };
  const decline = async id => { await sb.from("profiles").delete().eq("id",id); st("Declined."); load(); };
  const approveSignup = async id => { await sb.from("signups").update({status:"approved"}).eq("id",id); st("✓ Signup approved!"); load(); };
  const declineSignup = async id => { await sb.from("signups").delete().eq("id",id); st("Signup declined."); load(); };
  const checkIn = async id => { await sb.from("signups").update({checked_in:new Date().toISOString()}).eq("id",id); st("✓ Checked in!"); load(); };
  const checkOut = async (id,oppId,volId,title,proj,hours) => { await sb.from("signups").update({checked_out:new Date().toISOString()}).eq("id",id); await sb.from("hour_logs").insert({volunteer_id:volId,activity:title,project:proj,hours:Number(hours),date:new Date().toISOString().split("T")[0],notes:"Checked in via event attendance"}); st("✅ "+hours+"h logged!"); load(); };
  const delOpp = async id => { await sb.from("opportunities").delete().eq("id",id); st("Removed."); load(); };
  const addOpp = async () => { if(!no.title||!no.date||!no.location){st("Fill title, date and location.");return;} await sb.from("opportunities").insert({...no,spots:Number(no.spots)||10,hours:Number(no.hours)||2,created_by:profile.id}); setNo({title:"",project:"food-boxes",date:"",spots:"",hours:"",location:"",description:""}); st("✓ Published!"); setTab("opps"); load(); };

  const TABS = [{id:"pending",label:"Pending",count:pending.length,alert:pending.length>0},{id:"vols",label:"Volunteers",count:vols.length,alert:false},{id:"opps",label:"Opportunities",count:opps.length,alert:false},{id:"add",label:"+ Add",count:null,alert:false}];

  if (viewProf) return (
    <div style={{minHeight:"100vh",background:PL,fontFamily:BF}}>
      <header style={{background:DK,height:60,display:"flex",alignItems:"center",padding:"0 16px",gap:12,position:"sticky",top:0,zIndex:100}}>
        <button onClick={()=>setViewProf(null)} style={{background:"rgba(255,255,255,0.1)",color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:700}}>← Back</button>
        <span style={{fontFamily:HF,fontWeight:900,fontSize:16,color:"#fff",textTransform:"uppercase"}}>Profile</span>
      </header>
      <main style={{maxWidth:640,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{background:"#fff",borderRadius:16,padding:24,border:"1px solid "+BR,marginBottom:16,display:"flex",alignItems:"center",gap:16}}>
          <Avtr u={viewProf} sz={70}/>
          <div>
            <div style={{fontFamily:HF,fontWeight:900,fontSize:20,color:DK}}>{viewProf.first_name} {viewProf.surname}</div>
            <div style={{fontSize:13,color:MT}}>{viewProf.email}</div>
            <div style={{fontSize:12,color:MT,marginTop:2}}>DOB: {viewProf.dob||"Not provided"}</div>
          </div>
        </div>
        <div style={{background:"#fff",borderRadius:16,padding:20,border:"1px solid "+BR,marginBottom:16}}>
          <h3 style={{fontFamily:HF,fontSize:14,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:12}}>Background</h3>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {viewProf.is_student && <div style={{background:"#EDE9FE",color:"#5B21B6",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:600}}>🎓 {viewProf.student_level||"Student"}{viewProf.student_school?" · "+viewProf.student_school:""}</div>}

              <button onClick={()=>approve(u.id)} style={{flex:1,background:MD,color:DK,border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>✓ Approve</button>

        {tab==="vols" && <div>
          <h2 style={{fontFamily:HF,fontSize:16,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:12}}>Active Volunteers ({vols.length})</h2>
          {vols.map(u => <div key={u.id} style={{background:"#fff",borderRadius:14,padding:"12px 14px",border:"1px solid "+BR,marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
            <Avtr u={u} sz={40}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14,fontFamily:BF}}>{u.first_name} {u.surname}</div>
              <div style={{fontSize:12,color:MT}}>{u.email}</div>
            </div>
            <button onClick={()=>setViewProf(u)} style={{background:PL,color:DK,border:"1px solid "+BR,borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>View</button>
          </div>)}
        </div>}

        {tab==="opps" && <div>
          <h2 style={{fontFamily:HF,fontSize:16,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:12}}>Opportunities & Sign-ups</h2>
          {opps.map(o => {
            const p = gp(o.project);
            const sups = oppSignups[o.id]||[];
            const pendingSups = sups.filter(s=>s.status==="pending");
            const approvedSups = sups.filter(s=>s.status==="approved");
            return <div key={o.id} style={{background:"#fff",borderRadius:14,padding:"14px 16px",border:"1px solid "+BR,marginBottom:12,borderLeft:"4px solid "+p.bg}}>

                <div style={{flex:1}}>
                  <Tag pid={o.project} sm/>
                  <div style={{fontWeight:700,fontSize:15,marginTop:6,color:DK,fontFamily:BF}}>{o.title}</div>
                  <div style={{fontSize:12,color:MT,marginTop:2}}>📅 {o.date} · 📍 {o.location} · {o.hours}h</div>
                  <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
                    {pendingSups.length>0 && <span style={{background:"#FEF3C7",color:"#D97706",borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700}}>⏳ {pendingSups.length} pending</span>}
                    {approvedSups.length>0 && <span style={{background:"#DCFCE7",color:"#166534",borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700}}>✓ {approvedSups.length} approved</span>}
                  </div>
                </div>
                <button onClick={()=>delOpp(o.id)} style={{background:"#FEE2E2",color:"#DC2626",border:"none",borderRadius:8,padding:"6px 10px",fontSize:12,cursor:"pointer",fontWeight:700,marginLeft:10}}>Remove</button>
              </div>
              {sups.length>0 && <div style={{borderTop:"1px solid "+BR,paddingTop:10,marginTop:8}}>
                {sups.map(s => <div key={s.volunteer_id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #F0FDF4",flexWrap:"wrap"}}>
                  <button onClick={()=>setViewProf(s.profiles)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:8,flex:1,textAlign:"left",padding:0}}>
                    <Avtr u={s.profiles} sz={32}/>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:DK,fontFamily:BF}}>{s.profiles?.first_name} {s.profiles?.surname}</div>
                      <div style={{fontSize:11,color:MT}}>{s.profiles?.email}</div>
                    </div>
                  </button>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    {s.status==="pending" && <div style={{display:"flex",gap:4}}>
                      <button onClick={()=>approveSignup(s.id)} style={{background:MD,color:DK,border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>✓</button>
                      <button onClick={()=>declineSignup(s.id)} style={{background:"#FEE2E2",color:"#DC2626",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>✕</button>
                    </div>}
                    {s.status==="approved"&&!s.checked_in && <button onClick={()=>checkIn(s.id)} style={{background:"#DBEAFE",color:"#1D4ED8",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>📍 Check In</button>}
                    {s.checked_in&&!s.checked_out && <div style={{display:"flex",gap:4,alignItems:"center"}}>
                      <span style={{fontSize:11,color:"#1D4ED8",fontWeight:600}}>✓ In</span>
                      <button onClick={()=>checkOut(s.id,o.id,s.volunteer_id,o.title,o.project,o.hours)} style={{background:"#7C3AED",color:"#fff",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>🏁 Out</button>
                    </div>}
                    {s.checked_out && <span style={{fontSize:11,color:"#7C3AED",fontWeight:700,background:"#F3E8FF",padding:"3px 8px",borderRadius:20}}>✅ {o.hours}h</span>}
                  </div>
                </div>)}
              </div>}
            </div>;
          })}
        </div>}

        {tab==="add" && <div>
          <h2 style={{fontFamily:HF,fontSize:16,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:16}}>Add New Opportunity</h2>
          <div style={{background:"#fff",borderRadius:18,padding:"20px 16px",border:"1px solid "+BR}}>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <Field label="Project"><select value={no.project} onChange={e=>setNo(n=>({...n,project:e.target.value}))} style={inp}>{PROJECTS.map(p=><option key={p.id} value={p.id}>{p.emoji} {p.label}</option>)}</select></Field>
              <Field label="Title *"><input type="text" placeholder="e.g. Box Packing Day" value={no.title} onChange={e=>setNo(n=>({...n,title:e.target.value}))} style={inp}/></Field>
              <Field label="Description"><textarea value={no.description} onChange={e=>setNo(n=>({...n,description:e.target.value}))} rows={3} placeholder="What will volunteers do?" style={{...inp,resize:"vertical"}}/></Field>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <Field label="Date *"><input type="date" value={no.date} onChange={e=>setNo(n=>({...n,date:e.target.value}))} style={inp}/></Field>
                <Field label="Hours"><input type="number" placeholder="3" value={no.hours} onChange={e=>setNo(n=>({...n,hours:e.target.value}))} style={inp}/></Field>
              </div>
              <Field label="Location *"><input type="text" placeholder="e.g. Feed a Friend HQ" value={no.location} onChange={e=>setNo(n=>({...n,location:e.target.value}))} style={inp}/></Field>
              <Field label="Spots"><input type="number" placeholder="10" value={no.spots} onChange={e=>setNo(n=>({...n,spots:e.target.value}))} style={inp}/></Field>
              <button onClick={addOpp} style={{background:DK,color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer"}}>Publish Opportunity</button>
            </div>
          </div>
        </div>}
      </main>
    </div>
  );
}

// ── VOLUNTEER APP ─────────────────────────────────────────────
function Volunteer({profile, onLogout, onUpdateProfile}) {
  const [view, setView] = useState("dashboard");
  const [logs, setLogs] = useState([]);
  const [opps, setOpps] = useState([]);
  const [su, setSu] = useState([]);
  const [fp, setFp] = useState("all");
  const [form, setForm] = useState({activity:"",hours:"",date:"",project:"food-boxes",notes:""});
  const [toast, setToast] = useState(null);
  const st = m => { setToast(m); setTimeout(()=>setToast(null),3000); };

  useEffect(()=>{ loadData(); },[]);

  async function loadData() {
    const [{data:o},{data:l},{data:s}] = await Promise.all([
      sb.from("opportunities").select("*").order("date"),
      sb.from("hour_logs").select("*").eq("volunteer_id",profile.id).order("created_at",{ascending:false}),
      sb.from("signups").select("opportunity_id,status").eq("volunteer_id",profile.id),
    ]);
    setOpps(o||[]); setLogs(l||[]); setSu(s||[]);
  }

  async function submitLog() {
    if (!form.activity||!form.hours||!form.date) return;
    await sb.from("hour_logs").insert({...form,hours:Number(form.hours),volunteer_id:profile.id});
    setForm({activity:"",hours:"",date:"",project:"food-boxes",notes:""}); st("✓ Hours logged — thank you!"); loadData();
  }

  async function signUp(o) {
    if (su.find(x=>x.opportunity_id===o.id)) return;
    await sb.from("signups").insert({volunteer_id:profile.id,opportunity_id:o.id,status:"pending"});
    st("✓ Request sent! Awaiting admin approval."); loadData();
  }

  async function uploadPhoto(file) {
    const ext = file.name.split(".").pop();
    const {data} = await sb.storage.from("avatars").upload(profile.id+"/avatar."+ext, file, {upsert:true});
    if (data) { const {data:u} = sb.storage.from("avatars").getPublicUrl(data.path); await sb.from("profiles").update({photo_url:u.publicUrl}).eq("id",profile.id); onUpdateProfile({...profile,photo_url:u.publicUrl}); st("✓ Photo updated!"); }
  }

  const th = logs.reduce((s,l)=>s+Number(l.hours),0);
  const fo = fp==="all" ? opps : opps.filter(o=>o.project===fp);
  const NAV = [{id:"dashboard",label:"Home"},{id:"opportunities",label:"Opportunities"},{id:"log",label:"Log Hours"},{id:"history",label:"My Hours"}];

  return (
    <div style={{minHeight:"100vh",background:PL,fontFamily:BF}}>
      <header style={{background:DK,height:60,display:"flex",alignItems:"center",padding:"0 14px",position:"sticky",top:0,zIndex:100,gap:12,boxShadow:"0 2px 8px rgba(0,0,0,.3)"}}>
        <button onClick={()=>setView("dashboard")} style={{background:"none",border:"none",cursor:"pointer",padding:0,flexShrink:0}}>
          <img src={LOGO} alt="Feed a Friend" style={{height:42,display:"block"}}/>
        </button>
        <nav style={{display:"flex",gap:2,flex:1,justifyContent:"flex-end",alignItems:"center"}}>
          {NAV.map(n=><button key={n.id} onClick={()=>setView(n.id)} style={{background:view===n.id?MD:"transparent",color:view===n.id?DK:"#BBF7D0",border:"none",borderRadius:8,padding:"6px 9px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{n.label}</button>)}
          <button onClick={onLogout} style={{background:"#DC2626",color:"#fff",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,marginLeft:4}}>Sign Out</button>
        </nav>
      </header>
      <Toast msg={toast}/>
      <main style={{maxWidth:640,margin:"0 auto",padding:"16px 14px 40px"}}>

        {view==="dashboard" && <div className="fade">
          <div style={{background:DK,borderRadius:18,padding:"22px 18px",marginBottom:16,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",right:-10,top:-10,fontSize:100,opacity:.05}}>🥦</div>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
              <Avtr u={profile} sz={46}/>
              <p style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#86EFAC",fontFamily:BF}}>Welcome back, {profile.first_name}!</p>
            </div>
            <h1 style={{fontFamily:HF,fontSize:30,fontWeight:900,textTransform:"uppercase",color:"#fff",lineHeight:1.05,marginBottom:16}}>Together<br/>for Good</h1>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <button onClick={()=>setView("opportunities")} style={{background:MD,color:DK,border:"none",borderRadius:10,padding:"10px 16px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:BF}}>Find Opportunities →</button>
              <button onClick={()=>setView("log")} style={{background:"rgba(255,255,255,.12)",color:"#fff",border:"1.5px solid rgba(255,255,255,.25)",borderRadius:10,padding:"10px 16px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:BF}}>Log Hours</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
            {[{label:"Total Hours",value:th,sub:"hrs given",color:GN},{label:"Activities",value:logs.length,sub:"logged",color:"#7C3AED"},{label:"Signups",value:su.length,sub:"pending/approved",color:"#E8732A"}].map(s=><div key={s.label} style={{background:"#fff",borderRadius:14,padding:"12px 10px",border:"1px solid "+BR,borderTop:"4px solid "+s.color}}>
              <div style={{fontSize:26,fontWeight:900,color:s.color,fontFamily:HF,lineHeight:1}}>{s.value}</div>
              <div style={{fontSize:10,color:MT,textTransform:"uppercase",letterSpacing:.5,marginTop:2}}>{s.sub}</div>
              <div style={{fontSize:11,fontWeight:600,color:DK,marginTop:3}}>{s.label}</div>
            </div>)}
          </div>
          <h2 style={{fontFamily:HF,fontSize:17,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:10}}>Our Projects</h2>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {PROJECTS.map(p=><button key={p.id} className="card" onClick={()=>{setView("opportunities");setFp(p.id);}} style={{background:p.bg,border:"none",borderRadius:14,padding:"14px 12px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:26,flexShrink:0}}>{p.emoji}</span>
              <div>
                <div style={{fontWeight:700,fontSize:13,color:"#fff",lineHeight:1.3,fontFamily:BF}}>{p.label}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,.75)",marginTop:2,fontFamily:BF}}>{opps.filter(o=>o.project===p.id).length} opportunities</div>
              </div>
            </button>)}
          </div>
          <h2 style={{fontFamily:HF,fontSize:17,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:10}}>Recent Activity</h2>
          <div style={{background:"#fff",borderRadius:14,overflow:"hidden",border:"1px solid "+BR}}>
            {logs.length===0 && <p style={{padding:24,color:MT,textAlign:"center",fontFamily:BF}}>No hours logged yet.</p>}
            {logs.slice(0,5).map((l,i)=>{ const p=gp(l.project); return <div key={l.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:i<Math.min(logs.length,5)-1?"1px solid "+PL:"none"}}>
              <div style={{width:34,height:34,borderRadius:10,background:p.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>{p.emoji}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:13,fontFamily:BF,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{l.activity}</div>
                <div style={{fontSize:11,color:MT,fontFamily:BF}}>{l.date}</div>
              </div>
              <div style={{fontWeight:900,fontSize:17,color:p.bg,fontFamily:HF,flexShrink:0}}>{l.hours}h</div>
            </div>;})}
          </div>
        </div>}

        {view==="opportunities" && <div className="fade">
          <h1 style={{fontFamily:HF,fontSize:24,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:4}}>Volunteer Opportunities</h1>
          <p style={{color:MT,fontSize:13,marginBottom:14,fontFamily:BF}}>Find your next chance to make a difference.</p>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
            <button onClick={()=>setFp("all")} style={{padding:"5px 12px",borderRadius:20,border:"2px solid "+(fp==="all"?GN:BR),background:fp==="all"?GN:"#fff",color:fp==="all"?"#fff":DK,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:BF}}>All</button>
            {PROJECTS.map(p=><button key={p.id} onClick={()=>setFp(p.id)} style={{padding:"5px 10px",borderRadius:20,border:"2px solid "+(fp===p.id?p.bg:BR),background:fp===p.id?p.bg:"#fff",color:fp===p.id?"#fff":DK,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:BF}}>{p.emoji} {p.label}</button>)}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {fo.map(o=>{ const p=gp(o.project); const signup=su.find(x=>x.opportunity_id===o.id); const done=!!signup; return <div key={o.id} className="card" style={{background:"#fff",borderRadius:16,border:"1px solid "+BR,borderLeft:"5px solid "+p.bg,padding:"14px 14px 12px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><Tag pid={o.project}/><span style={{fontFamily:HF,fontWeight:800,fontSize:13,color:p.bg}}>{o.hours}h</span></div>
              <div style={{fontFamily:HF,fontWeight:900,fontSize:15,textTransform:"uppercase",color:DK,marginBottom:4}}>{o.title}</div>
              <div style={{fontSize:12,color:MT,lineHeight:1.5,marginBottom:8,fontFamily:BF}}>{o.description}</div>
              <div style={{fontSize:11,color:MT,marginBottom:10,fontFamily:BF}}>📅 {o.date} · 📍 {o.location}</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,background:p.light,color:p.text,padding:"2px 8px",borderRadius:20,fontWeight:600,fontFamily:BF}}>{o.spots} spots</span>
                <button onClick={()=>signUp(o)} disabled={done} style={{background:done?(signup?.status==="pending"?"#FEF3C7":p.light):p.bg,color:done?(signup?.status==="pending"?"#D97706":p.text):"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:done?"default":"pointer",fontSize:12,fontWeight:700,fontFamily:BF}}>{done?(signup?.status==="pending"?"⏳ Pending":"✓ Approved"):"Sign Up →"}</button>
              </div>
            </div>;})}
          </div>
        </div>}

        {view==="log" && <div className="fade">
          <h1 style={{fontFamily:HF,fontSize:24,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:4}}>Log Your Hours</h1>
          <p style={{color:MT,fontSize:13,marginBottom:18,fontFamily:BF}}>Every hour counts — thank you!</p>
          <div style={{background:"#fff",borderRadius:18,padding:"20px 16px",border:"1px solid "+BR}}>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <Field label="Project"><select value={form.project} onChange={e=>setForm(f=>({...f,project:e.target.value}))} style={inp}>{PROJECTS.map(p=><option key={p.id} value={p.id}>{p.emoji} {p.label}</option>)}</select></Field>
              <Field label="Event Name"><input type="text" placeholder="e.g. Pantry Stock" value={form.activity} onChange={e=>setForm(f=>({...f,activity:e.target.value}))} style={inp}/></Field>
              <Field label="Date of Event"><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={inp}/></Field>
              <Field label="Hours Volunteered"><input type="number" placeholder="e.g. 3" value={form.hours} onChange={e=>setForm(f=>({...f,hours:e.target.value}))} style={inp}/></Field>
              <Field label={<>Notes <span style={{fontWeight:400,color:MT}}>(optional)</span></>}><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} rows={3} placeholder="Share anything about your experience..." style={{...inp,resize:"vertical"}}/></Field>
              <button onClick={submitLog} style={{background:DK,color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:BF}}>Submit Hours 🌿</button>
            </div>
          </div>
        </div>}

        {view==="history" && <div className="fade">
          <div style={{background:"#fff",borderRadius:16,padding:16,border:"1px solid "+BR,marginBottom:16,display:"flex",alignItems:"center",gap:14}}>
            <Avtr u={profile} sz={58}/>
            <div style={{flex:1}}>
              <div style={{fontFamily:HF,fontWeight:900,fontSize:17,color:DK}}>{profile.first_name} {profile.surname}</div>
              <div style={{fontSize:12,color:MT,fontFamily:BF}}>{profile.email}</div>
              <label style={{display:"inline-block",marginTop:8,background:PL,color:DK,border:"1px solid "+BR,borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:BF}}>
                📷 Change Photo
                <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{if(e.target.files[0])uploadPhoto(e.target.files[0]);}}/>
              </label>
            </div>
          </div>
          <h1 style={{fontFamily:HF,fontSize:24,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:4}}>My Hours</h1>
          <p style={{color:MT,fontSize:13,marginBottom:14,fontFamily:BF}}><strong style={{color:GN}}>{th} hours</strong> across <strong style={{color:GN}}>{logs.length} activities</strong>.</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
            {PROJECTS.map(p=>{ const h=logs.filter(l=>l.project===p.id).reduce((s,l)=>s+Number(l.hours),0); if(!h) return null; return <div key={p.id} style={{background:p.bg,color:"#fff",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:700,fontFamily:BF}}>{p.emoji} {h}h {p.label}</div>;})}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {logs.map(l=>{ const p=gp(l.project); return <div key={l.id} style={{background:"#fff",borderRadius:14,padding:"12px 14px",border:"1px solid "+BR,borderLeft:"5px solid "+p.bg,display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:36,height:36,borderRadius:10,background:p.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{p.emoji}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:13,fontFamily:BF,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{l.activity}</div>
                <div style={{fontSize:11,color:MT,marginTop:2,fontFamily:BF}}>{l.date}</div>
                <div style={{marginTop:4}}><Tag pid={l.project} sm/></div>
              </div>
              <div style={{fontWeight:900,fontSize:22,color:p.bg,fontFamily:HF,flexShrink:0}}>{l.hours}h</div>
            </div>;})}
            {logs.length===0 && <p style={{padding:28,textAlign:"center",color:MT,fontFamily:BF,background:"#fff",borderRadius:14}}>No hours yet — go volunteer!</p>}
          </div>
        </div>}
      </main>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────
function App() {
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    sb.auth.getSession().then(async({data:{session}})=>{
      if (session) {
        const {data} = await sb.from("profiles").select("*").eq("id",session.user.id).single();
        setProfile(data);
      }
      setLoading(false);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange(event => {
      if (event==="SIGNED_OUT") setProfile(null);
    });
    return () => subscription.unsubscribe();
  },[]);

  const logout = async () => { await sb.auth.signOut(); setProfile(null); };

  if (loading) return <div style={{minHeight:"100vh",background:DK,display:"flex",alignItems:"center",justifyContent:"center"}}><div className="spinner"/></div>;
  if (!profile) return <Auth onAuth={p=>setProfile(p)}/>;
  if (profile.role==="admin") return <Admin profile={profile} onLogout={logout}/>;
  return <Volunteer profile={profile} onLogout={logout} onUpdateProfile={setProfile}/>;
}

// Hide splash and render
document.getElementById("splash").style.display = "none";
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
