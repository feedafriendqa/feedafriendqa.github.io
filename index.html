const PROJECTS = [
  { id: "food-boxes",        label: "Food Boxes",        emoji: "📦", bg: "#F5A623", light: "#FEF3C7", text: "#7C4D00" },
  { id: "welcome-baby",      label: "Welcome Baby",      emoji: "👶", bg: "#9B59B6", light: "#F3E8FF", text: "#5B21B6" },
  { id: "community-fridges", label: "Community Fridges", emoji: "🧊", bg: "#E8732A", light: "#FFEDD5", text: "#9A3412" },
  { id: "little-learners",   label: "Little Learners",   emoji: "📚", bg: "#1A9E8F", light: "#CCFBF1", text: "#134E4A" },
  { id: "pay-it-forward",    label: "Pay it Forward",    emoji: "🎁", bg: "#E74C3C", light: "#FEE2E2", text: "#991B1B" },
  { id: "giving-garden",     label: "Giving Garden",     emoji: "🌱", bg: "#8E44AD", light: "#EDE9FE", text: "#4C1D95" },
];

const H = "\'League Spartan\', sans-serif";
const B = "\'Poppins\', sans-serif";
const DARK = "#0A3D1F"; const GREEN = "#15803D"; const MID = "#22C55E";
const PALE = "#F0FDF4"; const BORDER = "#BBF7D0"; const MUTED = "#4B7C5A";
const GP = id => PROJECTS.find(p => p.id === id) || PROJECTS[0];
const inp = { width: "100%", padding: "12px 14px", border: "1.5px solid #BBF7D0", borderRadius: 10, fontSize: 15, fontFamily: B, outline: "none", boxSizing: "border-box", background: "#fff", color: DARK };

function Tag({ projectId, small }) {
  const p = GP(projectId);
  return <span style={{ background: p.light, color: p.text, border: `1px solid ${p.bg}50`, padding: small?"2px 8px":"3px 10px", borderRadius:20, fontSize:small?10:11, fontWeight:700, fontFamily:B, display:"inline-flex", alignItems:"center", gap:4, whiteSpace:"nowrap" }}>{p.emoji} {p.label}</span>;
}
function Field({ label, children }) {
  return <div><label style={{ display:"block", fontFamily:B, fontWeight:700, fontSize:13, color:DARK, marginBottom:6 }}>{label}</label>{children}</div>;
}
function Toast({ msg }) {
  if (!msg) return null;
  return <div style={{ position:"fixed", top:68, left:12, right:12, background:DARK, color:"#fff", padding:"12px 16px", borderRadius:12, zIndex:999, fontSize:14, fontWeight:600, textAlign:"center", fontFamily:B, border:`1px solid ${MID}`, boxShadow:"0 4px 20px rgba(0,0,0,0.3)" }}>{msg}</div>;
}
function Avatar({ profile, size=40 }) {
  if (profile?.photo_url) return <img src={profile.photo_url} alt="Profile" style={{ width:size, height:size, borderRadius:"50%", objectFit:"cover", flexShrink:0, border:`2px solid ${MID}` }} />;
  const initials = `${profile?.first_name?.[0]||""}${profile?.surname?.[0]||""}`;
  return <div style={{ width:size, height:size, borderRadius:"50%", background:MID, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:H, fontWeight:900, fontSize:size*0.35, color:DARK, flexShrink:0 }}>{initials}</div>;
}
function Spinner() {
  return <div style={{ minHeight:"100vh", background:DARK, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
    <img src={LOGO} alt="Feed a Friend" style={{ height:70 }} />
    <div style={{ width:32, height:32, border:`3px solid ${MID}`, borderTopColor:"transparent", borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />
    <style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style>
  </div>;
}

// ── AUTH ──────────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [mode, setMode] = useState("login");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [msg, setMsg] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [reg, setReg] = useState({ firstName:"", surname:"", dob:"", email:"", password:"", confirm:"", isStudent:false, isWorking:false, profession:"", projects:[], photo:null });

  async function doLogin() {
    setErr(""); setLoading(true);
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { setErr(error.message); setLoading(false); return; }
    const { data: profile } = await supabase.from("profiles").select("*").eq("id", data.user.id).single();
    if (profile && !profile.approved && profile.role !== "admin") {
      await supabase.auth.signOut();
      setErr("Your registration is pending admin approval. We\'ll be in touch soon!");
      setLoading(false); return;
    }
    onAuth(profile);
    setLoading(false);
  }

  async function doRegister() {
    setErr("");
    if (!reg.firstName||!reg.surname||!reg.dob||!reg.email||!reg.password) { setErr("Please fill in all required fields."); return; }
    if (reg.password !== reg.confirm) { setErr("Passwords do not match."); return; }
    if (reg.password.length < 6) { setErr("Password must be at least 6 characters."); return; }
    setLoading(true);
    const { data, error } = await supabase.auth.signUp({ email: reg.email, password: reg.password });
    if (error) { setErr(error.message); setLoading(false); return; }
    let photo_url = null;
    if (reg.photo && data.user) {
      const res = await fetch(reg.photo);
      const blob = await res.blob();
      const ext = blob.type.split("/")[1] || "jpg";
      const { data: up } = await supabase.storage.from("avatars").upload(`${data.user.id}/avatar.${ext}`, blob, { upsert: true });
      if (up) { const { data: url } = supabase.storage.from("avatars").getPublicUrl(up.path); photo_url = url.publicUrl; }
    }
    await supabase.from("profiles").insert({
      id: data.user.id, first_name: reg.firstName, surname: reg.surname,
      email: reg.email, dob: reg.dob, is_student: reg.isStudent,
      is_working: reg.isWorking, profession: reg.profession,
      projects: reg.projects, photo_url, role: "volunteer", approved: false
    });
    setMsg("Registration submitted! An admin will review and approve your account.");
    setMode("login"); setLoading(false);
  }

  async function doForgot() {
    if (!email) { setErr("Please enter your email."); return; }
    await supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
    setMsg("Password reset email sent! Check your inbox.");
    setMode("login");
  }

  const toggleProject = id => setReg(r => ({ ...r, projects: r.projects.includes(id) ? r.projects.filter(p=>p!==id) : [...r.projects,id] }));
  const bg = { minHeight:"100vh", background:DARK, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px 16px", fontFamily:B };
  const card = { background:"#fff", borderRadius:20, padding:"28px 22px", width:"100%", maxWidth:420 };

  return (
    <>
      <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
      <style>{"*{box-sizing:border-box;margin:0;padding:0}"}</style>
      <div style={bg}>
        <img src={LOGO} alt="Feed a Friend" style={{ height:70, marginBottom:6 }} />
        <p style={{ fontFamily:B, fontSize:11, color:MID, letterSpacing:2, textTransform:"uppercase", marginBottom:20 }}>Volunteer Portal</p>
        {msg && <div style={{ background:"#DCFCE7", color:DARK, borderRadius:12, padding:"12px 16px", marginBottom:16, fontSize:13, fontFamily:B, width:"100%", maxWidth:420, textAlign:"center", fontWeight:600 }}>{msg}</div>}

        {mode==="login" && <div style={card}>
          <h2 style={{ fontFamily:H, fontSize:22, fontWeight:900, textTransform:"uppercase", color:DARK, marginBottom:4 }}>Sign In</h2>
          <p style={{ fontFamily:B, color:MUTED, fontSize:13, marginBottom:20 }}>Welcome back!</p>
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            <Field label="Email"><input type="email" placeholder="you@email.com" value={email} onChange={e=>setEmail(e.target.value)} style={inp} /></Field>
            <Field label="Password">
              <div style={{ position:"relative" }}>
                <input type={showPw?"text":"password"} placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)} style={{ ...inp, paddingRight:50 }} />
                <button onClick={()=>setShowPw(s=>!s)} style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", fontSize:12, color:MUTED, fontFamily:B }}>{showPw?"Hide":"Show"}</button>
              </div>
            </Field>
            {err && <p style={{ color:"#DC2626", fontSize:13, fontFamily:B, fontWeight:600 }}>{err}</p>}
            <button onClick={doLogin} disabled={loading} style={{ background:MID, color:DARK, border:"none", borderRadius:12, padding:"14px", fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:B, opacity:loading?0.7:1 }}>{loading?"Signing in…":"Sign In →"}</button>
            <button onClick={()=>{setMode("forgot");setErr("");}} style={{ background:"none", border:"none", color:MUTED, fontSize:13, cursor:"pointer", fontFamily:B, textDecoration:"underline" }}>Forgot password?</button>
          </div>
          <div style={{ borderTop:`1px solid ${BORDER}`, marginTop:20, paddingTop:16, textAlign:"center" }}>
            <p style={{ fontFamily:B, fontSize:13, color:MUTED }}>New volunteer? <span onClick={()=>{setMode("register");setErr("");}} style={{ color:GREEN, fontWeight:700, cursor:"pointer" }}>Register here</span></p>
          </div>
        </div>}

        {mode==="forgot" && <div style={card}>
          <h2 style={{ fontFamily:H, fontSize:22, fontWeight:900, textTransform:"uppercase", color:DARK, marginBottom:4 }}>Reset Password</h2>
          <p style={{ fontFamily:B, color:MUTED, fontSize:13, marginBottom:20 }}>Enter your email and we\'ll send a reset link.</p>
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            <Field label="Email"><input type="email" placeholder="you@email.com" value={email} onChange={e=>setEmail(e.target.value)} style={inp} /></Field>
            {err && <p style={{ color:"#DC2626", fontSize:13, fontFamily:B, fontWeight:600 }}>{err}</p>}
            <button onClick={doForgot} style={{ background:MID, color:DARK, border:"none", borderRadius:12, padding:"14px", fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:B }}>Send Reset Link</button>
            <button onClick={()=>setMode("login")} style={{ background:"none", border:"none", color:MUTED, fontSize:13, cursor:"pointer", fontFamily:B, textDecoration:"underline" }}>← Back to Sign In</button>
          </div>
        </div>}

        {mode==="register" && <div style={{ ...card, maxHeight:"85vh", overflowY:"auto" }}>
          <h2 style={{ fontFamily:H, fontSize:22, fontWeight:900, textTransform:"uppercase", color:DARK, marginBottom:4 }}>Register</h2>
          <p style={{ fontFamily:B, color:MUTED, fontSize:13, marginBottom:20 }}>Join our volunteer community.</p>
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            <Field label="Profile Photo">
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:10 }}>
                {reg.photo ? <img src={reg.photo} alt="Profile" style={{ width:80, height:80, borderRadius:"50%", objectFit:"cover", border:`3px solid ${MID}` }} />
                  : <div style={{ width:80, height:80, borderRadius:"50%", background:PALE, border:`2px dashed ${BORDER}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:28 }}>👤</div>}
                <label style={{ background:DARK, color:"#fff", borderRadius:10, padding:"8px 16px", fontSize:13, fontWeight:700, fontFamily:B, cursor:"pointer" }}>
                  {reg.photo?"Change Photo":"Upload Photo"}
                  <input type="file" accept="image/*" style={{ display:"none" }} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setReg(r=>({...r,photo:ev.target.result}));r.readAsDataURL(f);}} />
                </label>
                {reg.photo && <button onClick={()=>setReg(r=>({...r,photo:null}))} style={{ background:"none", border:"none", color:MUTED, fontSize:12, cursor:"pointer", fontFamily:B, textDecoration:"underline" }}>Remove</button>}
              </div>
            </Field>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <Field label="First Name *"><input type="text" placeholder="Sara" value={reg.firstName} onChange={e=>setReg(r=>({...r,firstName:e.target.value}))} style={inp} /></Field>
              <Field label="Surname *"><input type="text" placeholder="Ahmed" value={reg.surname} onChange={e=>setReg(r=>({...r,surname:e.target.value}))} style={inp} /></Field>
            </div>
            <Field label="Date of Birth *"><input type="date" value={reg.dob} onChange={e=>setReg(r=>({...r,dob:e.target.value}))} style={inp} /></Field>
            <Field label="Email *"><input type="email" placeholder="you@email.com" value={reg.email} onChange={e=>setReg(r=>({...r,email:e.target.value}))} style={inp} /></Field>
            <Field label="Password *"><input type="password" placeholder="Min. 6 characters" value={reg.password} onChange={e=>setReg(r=>({...r,password:e.target.value}))} style={inp} /></Field>
            <Field label="Confirm Password *"><input type="password" placeholder="Repeat password" value={reg.confirm} onChange={e=>setReg(r=>({...r,confirm:e.target.value}))} style={inp} /></Field>
            <div style={{ background:PALE, borderRadius:12, padding:"14px 16px", display:"flex", flexDirection:"column", gap:12 }}>
              <label style={{ display:"flex", alignItems:"center", gap:10, cursor:"pointer", fontFamily:B, fontSize:14, fontWeight:600, color:DARK }}>
                <input type="checkbox" checked={reg.isStudent} onChange={e=>setReg(r=>({...r,isStudent:e.target.checked}))} style={{ width:18, height:18, accentColor:GREEN }} />
                Are you a student?
              </label>
              <label style={{ display:"flex", alignItems:"center", gap:10, cursor:"pointer", fontFamily:B, fontSize:14, fontWeight:600, color:DARK }}>
                <input type="checkbox" checked={reg.isWorking} onChange={e=>setReg(r=>({...r,isWorking:e.target.checked}))} style={{ width:18, height:18, accentColor:GREEN }} />
                Are you currently working?
              </label>
              {reg.isWorking && <Field label="Profession"><input type="text" placeholder="e.g. Teacher, Nurse…" value={reg.profession} onChange={e=>setReg(r=>({...r,profession:e.target.value}))} style={inp} /></Field>}
            </div>
            <Field label="Projects you\'re interested in">
              <div style={{ display:"flex", flexDirection:"column", gap:8, marginTop:4 }}>
                {PROJECTS.map(p=>(
                  <label key={p.id} style={{ display:"flex", alignItems:"center", gap:10, cursor:"pointer", padding:"10px 12px", borderRadius:10, background:reg.projects.includes(p.id)?p.light:"#fff", border:`1.5px solid ${reg.projects.includes(p.id)?p.bg:BORDER}`, transition:"all 0.15s" }}>
                    <input type="checkbox" checked={reg.projects.includes(p.id)} onChange={()=>toggleProject(p.id)} style={{ width:18, height:18, accentColor:p.bg }} />
                    <span style={{ fontSize:18 }}>{p.emoji}</span>
                    <span style={{ fontFamily:B, fontSize:14, fontWeight:600, color:reg.projects.includes(p.id)?p.text:DARK }}>{p.label}</span>
                  </label>
                ))}
              </div>
            </Field>
            {err && <p style={{ color:"#DC2626", fontSize:13, fontFamily:B, fontWeight:600 }}>{err}</p>}
            <button onClick={doRegister} disabled={loading} style={{ background:DARK, color:"#fff", border:"none", borderRadius:12, padding:"14px", fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:B, opacity:loading?0.7:1 }}>{loading?"Submitting…":"Submit Registration"}</button>
            <button onClick={()=>{setMode("login");setErr("");}} style={{ background:"none", border:"none", color:MUTED, fontSize:13, cursor:"pointer", fontFamily:B, textDecoration:"underline" }}>← Back to Sign In</button>
          </div>
        </div>}
        <p style={{ fontFamily:B, fontSize:11, color:"rgba(255,255,255,0.3)", marginTop:20 }}>feedafriend.org · Volunteer Portal</p>
      </div>
    </>
  );
}

// ── ADMIN PANEL ───────────────────────────────────────────────
function AdminPanel({ profile, onLogout }) {
  const [tab, setTab] = useState("pending");
  const [pending, setPending] = useState([]);
  const [volunteers, setVolunteers] = useState([]);
  const [opps, setOpps] = useState([]);
  const [toast, setToast] = useState(null);
  const [newOpp, setNewOpp] = useState({ title:"", project:"food-boxes", date:"", spots:"", hours:"", location:"", description:"" });
  const showToast = m => { setToast(m); setTimeout(()=>setToast(null),3000); };

  useEffect(() => { loadAll(); }, []);
  async function loadAll() {
    const { data: p } = await supabase.from("profiles").select("*").eq("approved", false).eq("role","volunteer");
    const { data: v } = await supabase.from("profiles").select("*").eq("approved", true).eq("role","volunteer");
    const { data: o } = await supabase.from("opportunities").select("*").order("date");
    setPending(p||[]); setVolunteers(v||[]); setOpps(o||[]);
  }
  async function approve(id) {
    await supabase.from("profiles").update({ approved:true }).eq("id",id);
    showToast("✓ Volunteer approved!"); loadAll();
  }
  async function decline(id) {
    await supabase.from("profiles").delete().eq("id",id);
    await supabase.auth.admin.deleteUser(id).catch(()=>{});
    showToast("Volunteer declined."); loadAll();
  }
  async function addOpp() {
    if (!newOpp.title||!newOpp.date||!newOpp.location) { showToast("Please fill title, date and location."); return; }
    await supabase.from("opportunities").insert({ ...newOpp, spots:Number(newOpp.spots)||10, hours:Number(newOpp.hours)||2, created_by:profile.id });
    setNewOpp({ title:"", project:"food-boxes", date:"", spots:"", hours:"", location:"", description:"" });
    showToast("✓ Opportunity published!"); setTab("opps"); loadAll();
  }
  async function deleteOpp(id) {
    await supabase.from("opportunities").delete().eq("id",id);
    showToast("Opportunity removed."); loadAll();
  }

  const TABS = [
    { id:"pending", label:`Pending (${pending.length})` },
    { id:"volunteers", label:`Volunteers (${volunteers.length})` },
    { id:"opps", label:`Opportunities (${opps.length})` },
    { id:"add", label:"+ Add Opportunity" },
  ];

  return (
    <>
      <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
      <style>{"*{box-sizing:border-box;margin:0;padding:0}body{background:#F0FDF4}"}</style>
      <div style={{ minHeight:"100vh", background:PALE, fontFamily:B }}>
        <header style={{ background:DARK, height:60, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 16px", position:"sticky", top:0, zIndex:100 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <img src={LOGO} alt="Feed a Friend" style={{ height:40 }} />
            <span style={{ fontFamily:H, fontWeight:900, fontSize:13, color:MID, textTransform:"uppercase", letterSpacing:1 }}>Admin</span>
          </div>
          <button onClick={onLogout} style={{ background:"#DC2626", color:"#fff", border:"none", borderRadius:8, padding:"6px 14px", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:B }}>Sign Out</button>
        </header>
        <Toast msg={toast} />
        <main style={{ maxWidth:640, margin:"0 auto", padding:"16px 14px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:16 }}>
            <Avatar profile={profile} size={48} />
            <div>
              <h1 style={{ fontFamily:H, fontSize:22, fontWeight:900, textTransform:"uppercase", color:DARK }}>Admin Panel</h1>
              <p style={{ fontFamily:B, color:MUTED, fontSize:12 }}>Welcome, {profile.first_name}</p>
            </div>
          </div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:20 }}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{ background:tab===t.id?DARK:"#fff", color:tab===t.id?"#fff":DARK, border:`1.5px solid ${tab===t.id?DARK:BORDER}`, borderRadius:20, padding:"7px 14px", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:B }}>{t.label}</button>
            ))}
          </div>

          {tab==="pending" && <div>
            <h2 style={{ fontFamily:H, fontSize:16, fontWeight:900, textTransform:"uppercase", color:DARK, marginBottom:12 }}>Pending Registrations</h2>
            {pending.length===0 && <p style={{ color:MUTED, fontFamily:B, fontSize:14 }}>No pending registrations. 🎉</p>}
            {pending.map(u=>(
              <div key={u.id} style={{ background:"#fff", borderRadius:14, padding:"16px", border:`1px solid ${BORDER}`, marginBottom:10 }}>
                <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:10 }}>
                  <Avatar profile={u} size={44} />
                  <div>
                    <div style={{ fontWeight:700, fontSize:15, fontFamily:B }}>{u.first_name} {u.surname}</div>
                    <div style={{ fontSize:12, color:MUTED, fontFamily:B }}>{u.email}</div>
                    <div style={{ fontSize:12, color:MUTED, fontFamily:B }}>DOB: {u.dob}</div>
                  </div>
                </div>
                <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 }}>
                  {u.is_student && <span style={{ background:"#EDE9FE", color:"#5B21B6", borderRadius:20, padding:"2px 8px", fontSize:11, fontWeight:700, fontFamily:B }}>🎓 Student</span>}
                  {u.is_working && <span style={{ background:"#FFEDD5", color:"#9A3412", borderRadius:20, padding:"2px 8px", fontSize:11, fontWeight:700, fontFamily:B }}>💼 {u.profession||"Working"}</span>}
                </div>
                {u.projects?.length>0 && <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:10 }}>{u.projects.map(pid=><Tag key={pid} projectId={pid} small />)}</div>}
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={()=>approve(u.id)} style={{ flex:1, background:MID, color:DARK, border:"none", borderRadius:8, padding:"10px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:B }}>✓ Approve</button>
                  <button onClick={()=>decline(u.id)} style={{ flex:1, background:"#FEE2E2", color:"#DC2626", border:"none", borderRadius:8, padding:"10px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:B }}>✕ Decline</button>
                </div>
              </div>
            ))}
          </div>}

          {tab==="volunteers" && <div>
            <h2 style={{ fontFamily:H, fontSize:16, fontWeight:900, textTransform:"uppercase", color:DARK, marginBottom:12 }}>Active Volunteers ({volunteers.length})</h2>
            {volunteers.map(u=>(
              <div key={u.id} style={{ background:"#fff", borderRadius:14, padding:"12px 14px", border:`1px solid ${BORDER}`, marginBottom:8, display:"flex", alignItems:"center", gap:12 }}>
                <Avatar profile={u} size={40} />
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:700, fontSize:14, fontFamily:B }}>{u.first_name} {u.surname}</div>
                  <div style={{ fontSize:12, color:MUTED, fontFamily:B }}>{u.email}</div>
                  <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginTop:4 }}>
                    {u.is_student && <span style={{ background:"#EDE9FE", color:"#5B21B6", borderRadius:20, padding:"1px 6px", fontSize:10, fontWeight:700, fontFamily:B }}>🎓 Student</span>}
                    {u.is_working && <span style={{ background:"#FFEDD5", color:"#9A3412", borderRadius:20, padding:"1px 6px", fontSize:10, fontWeight:700, fontFamily:B }}>💼 {u.profession}</span>}
                  </div>
                </div>
                <span style={{ fontSize:11, background:"#DCFCE7", color:"#166534", borderRadius:20, padding:"3px 10px", fontWeight:700, fontFamily:B }}>Active</span>
              </div>
            ))}
          </div>}

          {tab==="opps" && <div>
            <h2 style={{ fontFamily:H, fontSize:16, fontWeight:900, textTransform:"uppercase", color:DARK, marginBottom:12 }}>All Opportunities</h2>
            {opps.map(o=>{ const p=GP(o.project); return (
              <div key={o.id} style={{ background:"#fff", borderRadius:14, padding:"12px 14px", border:`1px solid ${BORDER}`, marginBottom:8, borderLeft:`4px solid ${p.bg}` }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                  <div style={{ flex:1 }}>
                    <Tag projectId={o.project} small />
                    <div style={{ fontWeight:700, fontSize:14, fontFamily:B, marginTop:6 }}>{o.title}</div>
                    <div style={{ fontSize:12, color:MUTED, fontFamily:B, marginTop:2 }}>📅 {o.date} · 📍 {o.location} · {o.hours}h · {o.spots} spots</div>
                  </div>
                  <button onClick={()=>deleteOpp(o.id)} style={{ background:"#FEE2E2", color:"#DC2626", border:"none", borderRadius:8, padding:"6px 10px", fontSize:12, cursor:"pointer", fontFamily:B, fontWeight:700, marginLeft:10, flexShrink:0 }}>Remove</button>
                </div>
              </div>
            );})}
          </div>}

          {tab==="add" && <div>
            <h2 style={{ fontFamily:H, fontSize:16, fontWeight:900, textTransform:"uppercase", color:DARK, marginBottom:16 }}>Add New Opportunity</h2>
            <div style={{ background:"#fff", borderRadius:18, padding:"20px 16px", border:`1px solid ${BORDER}` }}>
              <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                <Field label="Project"><select value={newOpp.project} onChange={e=>setNewOpp(n=>({...n,project:e.target.value}))} style={inp}>{PROJECTS.map(p=><option key={p.id} value={p.id}>{p.emoji} {p.label}</option>)}</select></Field>
                <Field label="Title *"><input type="text" placeholder="e.g. Box Packing Day" value={newOpp.title} onChange={e=>setNewOpp(n=>({...n,title:e.target.value}))} style={inp} /></Field>
                <Field label="Description"><textarea value={newOpp.description} onChange={e=>setNewOpp(n=>({...n,description:e.target.value}))} rows={3} placeholder="What will volunteers do?" style={{ ...inp, resize:"vertical" }} /></Field>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                  <Field label="Date *"><input type="date" value={newOpp.date} onChange={e=>setNewOpp(n=>({...n,date:e.target.value}))} style={inp} /></Field>
                  <Field label="Hours"><input type="number" placeholder="e.g. 3" value={newOpp.hours} onChange={e=>setNewOpp(n=>({...n,hours:e.target.value}))} style={inp} /></Field>
                </div>
                <Field label="Location *"><input type="text" placeholder="e.g. Feed a Friend HQ" value={newOpp.location} onChange={e=>setNewOpp(n=>({...n,location:e.target.value}))} style={inp} /></Field>
                <Field label="Spots"><input type="number" placeholder="e.g. 10" value={newOpp.spots} onChange={e=>setNewOpp(n=>({...n,spots:e.target.value}))} style={inp} /></Field>
                <button onClick={addOpp} style={{ background:DARK, color:"#fff", border:"none", borderRadius:12, padding:"14px", fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:B }}>Publish Opportunity</button>
              </div>
            </div>
          </div>}
        </main>
      </div>
    </>
  );
}

// ── VOLUNTEER APP ─────────────────────────────────────────────
function VolunteerApp({ profile, onLogout, onUpdateProfile }) {
  const [view, setView] = useState("dashboard");
  const [logs, setLogs] = useState([]);
  const [opps, setOpps] = useState([]);
  const [signedUp, setSignedUp] = useState([]);
  const [filterP, setFilterP] = useState("all");
  const [form, setForm] = useState({ activity:"", hours:"", date:"", project:"food-boxes", notes:"" });
  const [toast, setToast] = useState(null);
  const showToast = m => { setToast(m); setTimeout(()=>setToast(null),3000); };

  useEffect(() => { loadData(); }, []);
  async function loadData() {
    const { data: o } = await supabase.from("opportunities").select("*").order("date");
    const { data: l } = await supabase.from("hour_logs").select("*").eq("volunteer_id", profile.id).order("created_at", { ascending:false });
    const { data: s } = await supabase.from("signups").select("opportunity_id").eq("volunteer_id", profile.id);
    setOpps(o||[]); setLogs(l||[]); setSignedUp((s||[]).map(x=>x.opportunity_id));
  }
  async function submitLog() {
    if (!form.activity||!form.hours||!form.date) return;
    await supabase.from("hour_logs").insert({ ...form, hours:Number(form.hours), volunteer_id:profile.id });
    setForm({ activity:"", hours:"", date:"", project:"food-boxes", notes:"" });
    showToast("✓ Hours logged — thank you!"); loadData();
  }
  async function signUp(opp) {
    if (signedUp.includes(opp.id)) return;
    await supabase.from("signups").insert({ volunteer_id:profile.id, opportunity_id:opp.id });
    showToast(`✓ Signed up for "${opp.title}"!`); loadData();
  }
  async function uploadPhoto(file) {
    const ext = file.name.split(".").pop();
    const { data } = await supabase.storage.from("avatars").upload(`${profile.id}/avatar.${ext}`, file, { upsert:true });
    if (data) {
      const { data: url } = supabase.storage.from("avatars").getPublicUrl(data.path);
      await supabase.from("profiles").update({ photo_url: url.publicUrl }).eq("id", profile.id);
      onUpdateProfile({ ...profile, photo_url: url.publicUrl });
      showToast("✓ Photo updated!");
    }
  }

  const totalHours = logs.reduce((s,l)=>s+Number(l.hours),0);
  const filteredOpps = filterP==="all" ? opps : opps.filter(o=>o.project===filterP);

            <img src={LOGO} alt="Feed a Friend" style={{ height:42, display:"block" }} />

            {NAV.map(n=>(

            ))}
            <button onClick={onLogout} style={{ background:"#DC2626", color:"#fff", border:"none", borderRadius:8, padding:"6px 10px", cursor:"pointer", fontSize:11, fontWeight:700, fontFamily:B, marginLeft:4 }}>Sign Out</button>

                  <span style={{ fontSize:26, flexShrink:0 }}>{p.emoji}</span>
                  <div>
                    <div style={{ fontFamily:B, fontWeight:700, fontSize:13, color:"#fff", lineHeight:1.3 }}>{p.label}</div>

                  </div>

              ))}
            </div>
            <h2 style={{ fontFamily:H, fontSize:17, fontWeight:900, textTransform:"uppercase", color:DARK, marginBottom:10 }}>Recent Activity</h2>
            <div style={{ background:"#fff", borderRadius:14, overflow:"hidden", border:`1px solid ${BORDER}` }}>
              {logs.length===0 && <p style={{ padding:24, color:MUTED, textAlign:"center", fontFamily:B }}>No hours logged yet.</p>}
              {logs.slice(0,5).map((l,i)=>{ const p=GP(l.project); return (
                <div key={l.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 16px", borderBottom:i<Math.min(logs.length,5)-1?`1px solid ${PALE}`:"none" }}>

            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:16 }}>
              <button onClick={()=>setFilterP("all")} style={{ padding:"5px 12px", borderRadius:20, border:`2px solid ${filterP==="all"?GREEN:BORDER}`, background:filterP==="all"?GREEN:"#fff", color:filterP==="all"?"#fff":DARK, fontSize:11, fontWeight:700, fontFamily:B, cursor:"pointer" }}>All</button>

                <button key={p.id} onClick={()=>setFilterP(p.id)} style={{ padding:"5px 10px", borderRadius:20, border:`2px solid ${filterP===p.id?p.bg:BORDER}`, background:filterP===p.id?p.bg:"#fff", color:filterP===p.id?"#fff":DARK, fontSize:11, fontWeight:700, fontFamily:B, cursor:"pointer" }}>{p.emoji} {p.label}</button>
              ))}

            <div style={{ display:"flex", flexDirection:"column", gap:12 }}>

                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>

            </div>
          </div>}
        </main>
      </div>
    </>
  );
}

// ── ROOT ──────────────────────────────────────────────────────
function App() {
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    supabase.auth.getSession().then(async ({ data: { session } }) => {
      if (session) {
        const { data } = await supabase.from("profiles").select("*").eq("id", session.user.id).single();
        setProfile(data);
      }
      setLoading(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === "SIGNED_OUT") { setProfile(null); }
    });
    return () => subscription.unsubscribe();
  }, []);

  async function handleLogout() {
    await supabase.auth.signOut();
    setProfile(null);
  }

  if (loading) return <Spinner />;
  if (!profile) return <AuthScreen onAuth={p => setProfile(p)} />;
  if (profile.role === "admin") return <AdminPanel profile={profile} onLogout={handleLogout} />;
  return <VolunteerApp profile={profile} onLogout={handleLogout} onUpdateProfile={setProfile} />;
}

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
