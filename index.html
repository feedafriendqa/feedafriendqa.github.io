function Auth({onAuth}){
  const[mode,setMode]=useState("login");
  const[loading,setLoading]=useState(false);

  const[showPw,setShowPw]=useState(false);

  const ur=k=>e=>setR(x=>({...x,[k]:e.target.value}));
  const urb=k=>e=>setR(x=>({...x,[k]:e.target.checked}));
  const tp=id=>setR(x=>({...x,projs:x.projs.includes(id)?x.projs.filter(p=>p!==id):[...x.projs,id]}));

  async function login(){
    setErr("");setLoading(true);
    const{data,error}=await sb.auth.signInWithPassword({email:em,password:pw});
    if(error){setErr(error.message);setLoading(false);return;}
    const{data:p}=await sb.from("profiles").select("*").eq("id",data.user.id).single();

  }
  async function register(){
    setErr("");
    if(!r.fn||!r.sn||!r.dob||!r.email||!r.pw){setErr("Please fill in all required fields.");return;}

    setLoading(true);
    const{data,error}=await sb.auth.signUp({email:r.email,password:r.pw});
    if(error){setErr(error.message);setLoading(false);return;}
    let photo_url=null;
    if(r.photo&&data.user){
      const res=await fetch(r.photo);const blob=await res.blob();

function Admin({profile,onLogout}){
  const[tab,setTab]=useState("pending");
  const[pending,setPending]=useState([]);
  const[vols,setVols]=useState([]);
  const[opps,setOpps]=useState([]);
  const[toast,setToast]=useState(null);
  const[no,setNo]=useState({title:"",project:"food-boxes",date:"",spots:"",hours:"",location:"",description:""});
  const st=m=>{setToast(m);setTimeout(()=>setToast(null),3000);};
  const sn=k=>e=>setNo(n=>({...n,[k]:e.target.value}));

  const[oppSignups,setOppSignups]=useState({});
  useEffect(()=>{load();},[]);
  async function load(){
    const[{data:p},{data:v},{data:o},{data:s}]=await Promise.all([
      sb.from("profiles").select("*").eq("approved",false).eq("role","volunteer"),
      sb.from("profiles").select("*").eq("approved",true).eq("role","volunteer"),
      sb.from("opportunities").select("*").order("date"),
      sb.from("signups").select("*,profiles(id,first_name,surname,email,photo_url)"),
    ]);
    setPending(p||[]);setVols(v||[]);setOpps(o||[]);
    const grouped={};
    (s||[]).forEach(su=>{if(!grouped[su.opportunity_id])grouped[su.opportunity_id]=[];grouped[su.opportunity_id].push(su);});
    setOppSignups(grouped);
  }
  const approve=async id=>{
    await sb.from("profiles").update({approved:true}).eq("id",id);
    const {data:vol}=await sb.from("profiles").select("first_name,email").eq("id",id).single();
    if(vol){ await sendEmail('volunteer_approved', vol.first_name, vol.email, ''); }
    st("✓ Approved and email sent!");load();
  };
  const decline=async id=>{await sb.from("profiles").delete().eq("id",id);st("Declined.");load();};
  async function addOpp(){
    if(!no.title||!no.date||!no.location){st("Fill title, date and location.");return;}
    await sb.from("opportunities").insert({...no,spots:Number(no.spots)||10,hours:Number(no.hours)||2,created_by:profile.id});
    setNo({title:"",project:"food-boxes",date:"",spots:"",hours:"",location:"",description:""});
    st("✓ Published!");setTab("opps");load();
  }
  const delOpp=async id=>{await sb.from("opportunities").delete().eq("id",id);st("Removed.");load();};
  const approveSignup=async id=>{await sb.from("signups").update({status:"approved"}).eq("id",id);st("✓ Signup approved!");load();};
  const declineSignup=async id=>{await sb.from("signups").delete().eq("id",id);st("Signup declined.");load();};
  const checkIn=async id=>{
    await sb.from("signups").update({checked_in:new Date().toISOString()}).eq("id",id);
    st("✓ Checked in!");load();
  };
  const checkOut=async(id,oppId,volId,title,project,hours)=>{
    const now=new Date().toISOString();
    await sb.from("signups").update({checked_out:now}).eq("id",id);
    await sb.from("hour_logs").insert({volunteer_id:volId,activity:title,project,hours:Number(hours),date:new Date().toISOString().split("T")[0],notes:"Checked in via event attendance"});
    st("✅ Checked out — "+hours+"h logged!");load();
  };

  const TABS=[
    {id:"pending",label:"Pending",count:pending.length,alert:pending.length>0},
    {id:"vols",label:"Volunteers",count:vols.length,alert:false},
    {id:"opps",label:"Opportunities",count:opps.length,alert:false},
    {id:"add",label:"+ Add Opp",count:null,alert:false},
  ];

  // Profile modal
  if(viewProfile) return html`<div style=${{minHeight:"100vh",background:PL,fontFamily:BF}}>
    <header style=${{background:DK,height:60,display:"flex",alignItems:"center",padding:"0 16px",gap:12,position:"sticky",top:0,zIndex:100}}>
      <button onClick=${()=>setViewProfile(null)} style=${{background:"rgba(255,255,255,0.1)",color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:700}}>← Back</button>
      <span style=${{fontFamily:HF,fontWeight:900,fontSize:16,color:"#fff",textTransform:"uppercase"}}>Volunteer Profile</span>
    </header>
    <main style=${{maxWidth:640,margin:"0 auto",padding:"20px 16px"}}>

        <${Avtr} u=${viewProfile} sz=${70}/>
        <div>
          <div style=${{fontFamily:HF,fontWeight:900,fontSize:20,color:DK}}>${viewProfile.first_name} ${viewProfile.surname}</div>
          <div style=${{fontSize:13,color:MT,marginTop:2}}>${viewProfile.email}</div>
          <div style=${{fontSize:12,color:MT,marginTop:2}}>DOB: ${viewProfile.dob||"Not provided"}</div>
        </div>
      </div>
      <div style=${{background:"#fff",borderRadius:16,padding:20,border:"1px solid "+BR,marginBottom:16}}>

        <div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
          ${viewProfile.is_student&&html`<div style=${{background:"#EDE9FE",color:"#5B21B6",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:600}}>🎓 ${viewProfile.student_level||"Student"}${viewProfile.student_school?" · "+viewProfile.student_school:""}</div>`}
          ${viewProfile.is_working&&html`<div style=${{background:"#FFEDD5",color:"#9A3412",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:600}}>💼 ${viewProfile.profession||"Working professional"}</div>`}
          ${!viewProfile.is_student&&!viewProfile.is_working&&html`<p style=${{color:MT,fontSize:13}}>No background info provided.</p>`}
        </div>

      ${viewProfile.projects?.length>0&&html`<div style=${{background:"#fff",borderRadius:16,padding:20,border:"1px solid "+BR,marginBottom:16}}>

    <${Toast} msg=${toast}/>
    <main style=${{maxWidth:640,margin:"0 auto",padding:"16px 14px"}}>
      <div style=${{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>

        <div>

      </div>
      <div style=${{display:"flex",gap:6,flexWrap:"wrap",marginBottom:20}}>
        ${TABS.map(t=>html`<button key=${t.id} onClick=${()=>setTab(t.id)} style=${{background:tab===t.id?DK:"#fff",color:tab===t.id?"#fff":DK,border:"1.5px solid "+(tab===t.id?DK:BR),borderRadius:20,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
          ${t.label}
          ${t.count!==null&&html`<span style=${{background:t.alert?"#DC2626":(tab===t.id?"rgba(255,255,255,0.3)":BR),color:t.alert?"#fff":(tab===t.id?"#fff":MT),borderRadius:20,padding:"1px 7px",fontSize:11,fontWeight:700}}>${t.count}</span>`}
        </button>`)}
      </div>

      ${tab==="pending"&&html`<div>
        <h2 style=${{fontFamily:HF,fontSize:16,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:12}}>Pending Registrations</h2>
        ${pending.length===0&&html`<p style=${{color:MT,fontSize:14}}>No pending registrations 🎉</p>`}
        ${pending.map(u=>html`<div key=${u.id} style=${{background:"#fff",borderRadius:14,padding:16,border:"1px solid "+BR,marginBottom:10}}>
          <div style=${{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <${Avtr} u=${u} sz=${44}/>
            <div>
              <div style=${{fontWeight:700,fontSize:15}}>${u.first_name} ${u.surname}</div>
              <div style=${{fontSize:12,color:MT}}>${u.email} · DOB: ${u.dob}</div>

          </div>

            ${u.is_working&&html`<span style=${{background:"#FFEDD5",color:"#9A3412",borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700}}>💼 ${u.profession||"Working"}</span>`}

          <div style=${{display:"flex",gap:8}}>

                  ${pending.length>0&&html`<span style=${{background:"#FEF3C7",color:"#D97706",borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700}}>⏳ ${pending.length} pending</span>`}
                  ${approved.length>0&&html`<span style=${{background:"#DCFCE7",color:"#166534",borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700}}>✓ ${approved.length} approved</span>`}
                  ${checkedIn.length>0&&html`<span style=${{background:"#DBEAFE",color:"#1D4ED8",borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700}}>📍 ${checkedIn.length} checked in</span>`}
                  ${completed.length>0&&html`<span style=${{background:"#F3E8FF",color:"#7C3AED",borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700}}>✅ ${completed.length} completed</span>`}
                </div>
              </div>
              <button onClick=${()=>delOpp(o.id)} style=${{background:"#FEE2E2",color:"#DC2626",border:"none",borderRadius:8,padding:"6px 10px",fontSize:12,cursor:"pointer",fontWeight:700,marginLeft:10,flexShrink:0}}>Remove</button>
            </div>

            ${signupsForOpp.length>0&&html`<div style=${{borderTop:"1px solid "+BR,paddingTop:10,marginTop:8}}>
              ${signupsForOpp.map(s=>html`<div key=${s.volunteer_id} style=${{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #F0FDF4",flexWrap:"wrap"}}>
                <button onClick=${()=>setViewProfile(s.profiles)} style=${{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:8,flex:1,textAlign:"left",padding:0}}>
                  <${Avtr} u=${s.profiles} sz=${34}/>
                  <div>
                    <div style=${{fontSize:13,fontWeight:700,color:DK}}>${s.profiles?.first_name} ${s.profiles?.surname}</div>
                    <div style=${{fontSize:11,color:MT}}>${s.profiles?.email}</div>
                  </div>
                </button>
                <div style=${{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                  ${s.status==="pending"&&html`<div style=${{display:"flex",gap:4}}>
                    <button onClick=${()=>approveSignup(s.id)} style=${{background:MD,color:DK,border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>✓ Approve</button>
                    <button onClick=${()=>declineSignup(s.id)} style=${{background:"#FEE2E2",color:"#DC2626",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>✕</button>
                  </div>`}
                  ${s.status==="approved"&&!s.checked_in&&html`
                    <button onClick=${()=>checkIn(s.id)} style=${{background:"#DBEAFE",color:"#1D4ED8",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>📍 Check In</button>
                  `}
                  ${s.checked_in&&!s.checked_out&&html`<div style=${{display:"flex",gap:4,alignItems:"center"}}>
                    <span style=${{fontSize:11,color:"#1D4ED8",fontWeight:600}}>✓ Checked in</span>
                    <button onClick=${()=>checkOut(s.id,o.id,s.volunteer_id,o.title,o.project,o.hours)} style=${{background:"#7C3AED",color:"#fff",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>🏁 Check Out</button>
                  </div>`}
                  ${s.checked_out&&html`<span style=${{fontSize:11,color:"#7C3AED",fontWeight:700,background:"#F3E8FF",padding:"3px 8px",borderRadius:20}}>✅ ${o.hours}h logged</span>`}
                </div>
              </div>`)}
            </div>`}
          </div>`;
        })}
      </div>`}

      ${tab==="add"&&html`<div>
        <h2 style=${{fontFamily:HF,fontSize:16,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:16}}>Add New Opportunity</h2>
        <div style=${{background:"#fff",borderRadius:18,padding:"20px 16px",border:"1px solid "+BR}}>
          <div style=${{display:"flex",flexDirection:"column",gap:14}}>
            <${Fld} lbl="Project"><select value=${no.project} onChange=${sn("project")} style=${inp}>${PROJECTS.map(p=>html`<option key=${p.id} value=${p.id}>${p.emoji} ${p.label}</option>`)}</select></${Fld}>
            <${Fld} lbl="Title *"><input type="text" placeholder="e.g. Box Packing Day" value=${no.title} onInput=${sn("title")} style=${inp}/></${Fld}>
            <${Fld} lbl="Description"><textarea value=${no.description} onInput=${sn("description")} rows=3 placeholder="What will volunteers do?" style=${{...inp,resize:"vertical"}}/></${Fld}>
            <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <${Fld} lbl="Date *"><input type="date" value=${no.date} onInput=${sn("date")} style=${inp}/></${Fld}>
              <${Fld} lbl="Hours"><input type="number" placeholder="3" value=${no.hours} onInput=${sn("hours")} style=${inp}/></${Fld}>
            </div>
            <${Fld} lbl="Location *"><input type="text" placeholder="e.g. Feed a Friend HQ" value=${no.location} onInput=${sn("location")} style=${inp}/></${Fld}>
            <${Fld} lbl="Spots"><input type="number" placeholder="10" value=${no.spots} onInput=${sn("spots")} style=${inp}/></${Fld}>
            <button onClick=${addOpp} style=${{background:DK,color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer"}}>Publish Opportunity</button>
          </div>
        </div>
      </div>`}
    </main>
  </div>`;
}

function Volunteer({profile,onLogout,onUpdateProfile}){
  const[view,setView]=useState("dashboard");
  const[logs,setLogs]=useState([]);
  const[opps,setOpps]=useState([]);
  const[su,setSu]=useState([]);
  const[checkins,setCheckins]=useState({});
  const[fp,setFp]=useState("all");
  const[form,setForm]=useState({activity:"",hours:"",date:"",project:"food-boxes",notes:""});
  const[toast,setToast]=useState(null);
  const st=m=>{setToast(m);setTimeout(()=>setToast(null),3000);};
  const sf=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  useEffect(()=>{load();},[]);
  async function load(){
    const[{data:o},{data:l},{data:s}]=await Promise.all([
      sb.from("opportunities").select("*").order("date"),
      sb.from("hour_logs").select("*").eq("volunteer_id",profile.id).order("created_at",{ascending:false}),
      sb.from("signups").select("opportunity_id").eq("volunteer_id",profile.id),
    ]);
    setOpps(o||[]);setLogs(l||[]);setSu(s||[]);
  }
  async function submitLog(){
    if(!form.activity||!form.hours||!form.date)return;
    await sb.from("hour_logs").insert({...form,hours:Number(form.hours),volunteer_id:profile.id});
    setForm({activity:"",hours:"",date:"",project:"food-boxes",notes:""});
    st("✓ Hours logged — thank you!");load();
  }
  async function signUp(o){
    if(su.find(x=>x.opportunity_id===o.id))return;
    await sb.from("signups").insert({volunteer_id:profile.id,opportunity_id:o.id});
    st("✓ Signed up for "+o.title+"!");load();
  }
  async function uploadPhoto(file){
    const ext=file.name.split(".").pop();
    const{data}=await sb.storage.from("avatars").upload(profile.id+"/avatar."+ext,file,{upsert:true});
    if(data){const{data:u}=sb.storage.from("avatars").getPublicUrl(data.path);
      await sb.from("profiles").update({photo_url:u.publicUrl}).eq("id",profile.id);
      onUpdateProfile({...profile,photo_url:u.publicUrl});st("✓ Photo updated!");}
  }

  const th=logs.reduce((s,l)=>s+Number(l.hours),0);
  const fo=fp==="all"?opps:opps.filter(o=>o.project===fp);
  const NAV=[{id:"dashboard",label:"Home"},{id:"opportunities",label:"Opportunities"},{id:"log",label:"Log Hours"},{id:"history",label:"My Hours"}];

  // Profile modal
  if(viewProfile) return html`<div style=${{minHeight:"100vh",background:PL,fontFamily:BF}}>
    <header style=${{background:DK,height:60,display:"flex",alignItems:"center",padding:"0 16px",gap:12,position:"sticky",top:0,zIndex:100}}>
      <button onClick=${()=>setViewProfile(null)} style=${{background:"rgba(255,255,255,0.1)",color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:700}}>← Back</button>
      <span style=${{fontFamily:HF,fontWeight:900,fontSize:16,color:"#fff",textTransform:"uppercase"}}>Volunteer Profile</span>
    </header>
    <main style=${{maxWidth:640,margin:"0 auto",padding:"20px 16px"}}>
      <div style=${{background:"#fff",borderRadius:16,padding:24,border:"1px solid "+BR,marginBottom:16,display:"flex",alignItems:"center",gap:16}}>
        <${Avtr} u=${viewProfile} sz=${70}/>
        <div>
          <div style=${{fontFamily:HF,fontWeight:900,fontSize:20,color:DK}}>${viewProfile.first_name} ${viewProfile.surname}</div>
          <div style=${{fontSize:13,color:MT,marginTop:2}}>${viewProfile.email}</div>
          <div style=${{fontSize:12,color:MT,marginTop:2}}>DOB: ${viewProfile.dob||"Not provided"}</div>
        </div>
      </div>
      <div style=${{background:"#fff",borderRadius:16,padding:20,border:"1px solid "+BR,marginBottom:16}}>
        <h3 style=${{fontFamily:HF,fontSize:14,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:12}}>Background</h3>
        <div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
          ${viewProfile.is_student&&html`<div style=${{background:"#EDE9FE",color:"#5B21B6",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:600}}>🎓 ${viewProfile.student_level||"Student"}${viewProfile.student_school?" · "+viewProfile.student_school:""}</div>`}
          ${viewProfile.is_working&&html`<div style=${{background:"#FFEDD5",color:"#9A3412",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:600}}>💼 ${viewProfile.profession||"Working professional"}</div>`}
          ${!viewProfile.is_student&&!viewProfile.is_working&&html`<p style=${{color:MT,fontSize:13}}>No background info provided.</p>`}
        </div>
      </div>
      ${viewProfile.projects?.length>0&&html`<div style=${{background:"#fff",borderRadius:16,padding:20,border:"1px solid "+BR,marginBottom:16}}>
        <h3 style=${{fontFamily:HF,fontSize:14,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:12}}>Project Interests</h3>
        <div style=${{display:"flex",flexWrap:"wrap",gap:8}}>${viewProfile.projects.map(pid=>html`<${Tag} key=${pid} pid=${pid}/>`)}</div>
      </div>`}
      <div style=${{background:"#fff",borderRadius:16,padding:20,border:"1px solid "+BR}}>
        <h3 style=${{fontFamily:HF,fontSize:14,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:12}}>Status</h3>
        <span style=${{background:viewProfile.approved?"#DCFCE7":"#FEF3C7",color:viewProfile.approved?"#166534":"#D97706",borderRadius:20,padding:"5px 14px",fontSize:13,fontWeight:700}}>${viewProfile.approved?"✓ Active Volunteer":"⏳ Pending Approval"}</span>
      </div>
    </main>
  </div>`;

  return html`<div style=${{minHeight:"100vh",background:PL}}>
    <header style=${{background:DK,height:60,display:"flex",alignItems:"center",padding:"0 14px",position:"sticky",top:0,zIndex:100,gap:12,boxShadow:"0 2px 8px rgba(0,0,0,.3)"}}>
      <button onClick=${()=>setView("dashboard")} style=${{background:"none",border:"none",cursor:"pointer",padding:0,flexShrink:0}}>
        <img src=${LOGO} style=${{height:42,display:"block"}}/>
      </button>
      <nav style=${{display:"flex",gap:2,flex:1,justifyContent:"flex-end",alignItems:"center"}}>
        ${NAV.map(n=>html`<button key=${n.id} onClick=${()=>setView(n.id)} style=${{background:view===n.id?MD:"transparent",color:view===n.id?DK:"#BBF7D0",border:"none",borderRadius:8,padding:"6px 9px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>${n.label}</button>`)}
        <button onClick=${onLogout} style=${{background:"#DC2626",color:"#fff",border:"none",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,marginLeft:4}}>Sign Out</button>
      </nav>
    </header>
    <${Toast} msg=${toast}/>
    <main style=${{maxWidth:640,margin:"0 auto",padding:"16px 14px 40px"}}>

      ${view==="dashboard"&&html`<div class="fade">
        <div style=${{background:DK,borderRadius:18,padding:"22px 18px",marginBottom:16,position:"relative",overflow:"hidden"}}>
          <div style=${{position:"absolute",right:-10,top:-10,fontSize:100,opacity:.05}}>🥦</div>
          <div style=${{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <${Avtr} u=${profile} sz=${46}/>
            <p style=${{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"#86EFAC"}}>Welcome back, ${profile.first_name}!</p>
          </div>
          <h1 style=${{fontFamily:HF,fontSize:30,fontWeight:900,textTransform:"uppercase",color:"#fff",lineHeight:1.05,marginBottom:16}}>Together<br/>for Good</h1>
          <div style=${{display:"flex",gap:10,flexWrap:"wrap"}}>
            <button onClick=${()=>setView("opportunities")} style=${{background:MD,color:DK,border:"none",borderRadius:10,padding:"10px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Find Opportunities →</button>
            <button onClick=${()=>setView("log")} style=${{background:"rgba(255,255,255,.12)",color:"#fff",border:"1.5px solid rgba(255,255,255,.25)",borderRadius:10,padding:"10px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Log Hours</button>
          </div>
        </div>
        <div style=${{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
          ${[{label:"Total Hours",value:th,sub:"hrs given",color:GN},{label:"Activities",value:logs.length,sub:"logged",color:"#7C3AED"},{label:"Signups",value:su.length,sub:"upcoming",color:"#E8732A"}].map(s=>html`<div key=${s.label} style=${{background:"#fff",borderRadius:14,padding:"12px 10px",border:"1px solid "+BR,borderTop:"4px solid "+s.color}}>
            <div style=${{fontSize:26,fontWeight:900,color:s.color,fontFamily:HF,lineHeight:1}}>${s.value}</div>
            <div style=${{fontSize:10,color:MT,textTransform:"uppercase",letterSpacing:.5,marginTop:2}}>${s.sub}</div>
            <div style=${{fontSize:11,fontWeight:600,color:DK,marginTop:3}}>${s.label}</div>
          </div>`)}
        </div>
        <h2 style=${{fontFamily:HF,fontSize:17,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:10}}>Our Projects</h2>
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          ${PROJECTS.map(p=>html`<button key=${p.id} class="card" onClick=${()=>{setView("opportunities");setFp(p.id);}} style=${{background:p.bg,border:"none",borderRadius:14,padding:"14px 12px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
            <span style=${{fontSize:26,flexShrink:0}}>${p.emoji}</span>
            <div>
              <div style=${{fontWeight:700,fontSize:13,color:"#fff",lineHeight:1.3}}>${p.label}</div>
              <div style=${{fontSize:11,color:"rgba(255,255,255,.75)",marginTop:2}}>${opps.filter(o=>o.project===p.id).length} opportunities</div>
            </div>
          </button>`)}
        </div>
        <h2 style=${{fontFamily:HF,fontSize:17,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:10}}>Recent Activity</h2>
        <div style=${{background:"#fff",borderRadius:14,overflow:"hidden",border:"1px solid "+BR}}>
          ${logs.length===0&&html`<p style=${{padding:24,color:MT,textAlign:"center"}}>No hours logged yet.</p>`}
          ${logs.slice(0,5).map((l,i)=>{const p=gp(l.project);return html`<div key=${l.id} style=${{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:i<Math.min(logs.length,5)-1?"1px solid "+PL:"none"}}>
            <div style=${{width:34,height:34,borderRadius:10,background:p.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>${p.emoji}</div>
            <div style=${{flex:1,minWidth:0}}>
              <div style=${{fontWeight:600,fontSize:13,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>${l.activity}</div>
              <div style=${{fontSize:11,color:MT}}>${l.date}</div>
            </div>
            <div style=${{fontWeight:900,fontSize:17,color:p.bg,fontFamily:HF,flexShrink:0}}>${l.hours}h</div>
          </div>`;})}
        </div>
      </div>`}

      ${view==="opportunities"&&html`<div class="fade">
        <h1 style=${{fontFamily:HF,fontSize:24,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:4}}>Volunteer Opportunities</h1>
        <p style=${{color:MT,fontSize:13,marginBottom:14}}>Find your next chance to make a difference.</p>
        <div style=${{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
          <button onClick=${()=>setFp("all")} style=${{padding:"5px 12px",borderRadius:20,border:"2px solid "+(fp==="all"?GN:BR),background:fp==="all"?GN:"#fff",color:fp==="all"?"#fff":DK,fontSize:11,fontWeight:700,cursor:"pointer"}}>All</button>
          ${PROJECTS.map(p=>html`<button key=${p.id} onClick=${()=>setFp(p.id)} style=${{padding:"5px 10px",borderRadius:20,border:"2px solid "+(fp===p.id?p.bg:BR),background:fp===p.id?p.bg:"#fff",color:fp===p.id?"#fff":DK,fontSize:11,fontWeight:700,cursor:"pointer"}}>${p.emoji} ${p.label}</button>`)}
        </div>
        <div style=${{display:"flex",flexDirection:"column",gap:12}}>
          ${fo.map(o=>{const p=gp(o.project);const done=su.find(x=>x.opportunity_id===o.id);return html`<div key=${o.id} class="card" style=${{background:"#fff",borderRadius:16,border:"1px solid "+BR,borderLeft:"5px solid "+p.bg,padding:"14px 14px 12px"}}>
            <div style=${{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <${Tag} pid=${o.project}/><span style=${{fontFamily:HF,fontWeight:800,fontSize:13,color:p.bg}}>${o.hours}h</span>
            </div>
            <div style=${{fontFamily:HF,fontWeight:900,fontSize:15,textTransform:"uppercase",color:DK,marginBottom:4}}>${o.title}</div>
            <div style=${{fontSize:12,color:MT,lineHeight:1.5,marginBottom:8}}>${o.description}</div>
            <div style=${{fontSize:11,color:MT,marginBottom:10}}>📅 ${o.date} · 📍 ${o.location}</div>
            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style=${{fontSize:11,background:p.light,color:p.text,padding:"2px 8px",borderRadius:20,fontWeight:600}}>${o.spots} spots</span>
              <button onClick=${()=>signUp(o)} disabled=${done} style=${{background:done?(su.filter(x=>x.id===o.id&&x.status==="pending").length?"#FEF3C7":p.light):p.bg,color:done?(su.filter(x=>x.id===o.id&&x.status==="pending").length?"#D97706":p.text):"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:done?"default":"pointer",fontSize:12,fontWeight:700}}>${done?(su.filter(x=>x.id===o.id&&x.status==="pending").length?"⏳ Pending Approval":"✓ Approved"):"Sign Up →"}</button>
            </div>
          </div>`;})}
        </div>
      </div>`}

      ${view==="log"&&html`<div class="fade">
        <h1 style=${{fontFamily:HF,fontSize:24,fontWeight:900,textTransform:"uppercase",color:DK,marginBottom:4}}>Log Your Hours</h1>
        <p style=${{color:MT,fontSize:13,marginBottom:18}}>Every hour counts — thank you!</p>
        <div style=${{background:"#fff",borderRadius:18,padding:"20px 16px",border:"1px solid "+BR}}>
          <div style=${{display:"flex",flexDirection:"column",gap:14}}>
            <${Fld} lbl="Project"><select value=${form.project} onChange=${sf("project")} style=${inp}>${PROJECTS.map(p=>html`<option key=${p.id} value=${p.id}>${p.emoji} ${p.label}</option>`)}</select></${Fld}>
            <${Fld} lbl="Event Name"><input type="text" placeholder="e.g. Pantry Stock" value=${form.activity} onInput=${sf("activity")} style=${inp}/></${Fld}>
            <${Fld} lbl="Date of Event"><input type="date" value=${form.date} onInput=${sf("date")} style=${inp}/></${Fld}>
            <${Fld} lbl="Hours Volunteered"><input type="number" placeholder="e.g. 3" value=${form.hours} onInput=${sf("hours")} style=${inp}/></${Fld}>
            <${Fld} lbl="Notes (optional)"><textarea value=${form.notes} onInput=${sf("notes")} rows=3 placeholder="Share anything about your experience..." style=${{...inp,resize:"vertical"}}/></${Fld}>
            <button onClick=${submitLog} style=${{background:DK,color:"#fff",border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer"}}>Submit Hours 🌿</button>
          </div>
        </div>
      </div>`}

      ${view==="history"&&html`<div class="fade">
        <div style=${{background:"#fff",borderRadius:16,padding:16,border:"1px solid "+BR,marginBottom:16,display:"flex",alignItems:"center",gap:14}}>
          <${Avtr} u=${profile} sz=${58}/>
          <div style=${{flex:1}}>
            <div style=${{fontFamily:HF,fontWeight:900,fontSize:17,color:DK}}>${profile.first_name} ${profile.surname}</div>

            <label style=${{display:"inline-block",marginTop:8,background:PL,color:DK,border:"1px solid "+BR,borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>

        </div>
        <div style=${{display:"flex",flexDirection:"column",gap:10}}>
          ${logs.map(l=>{const p=gp(l.project);return html`<div key=${l.id} style=${{background:"#fff",borderRadius:14,padding:"12px 14px",border:"1px solid "+BR,borderLeft:"5px solid "+p.bg,display:"flex",alignItems:"center",gap:12}}>
            <div style=${{width:36,height:36,borderRadius:10,background:p.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>${p.emoji}</div>
            <div style=${{flex:1,minWidth:0}}>
              <div style=${{fontWeight:700,fontSize:13,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>${l.activity}</div>
              <div style=${{fontSize:11,color:MT,marginTop:2}}>${l.date}</div>
              <div style=${{marginTop:4}}><${Tag} pid=${l.project} sm=${true}/></div>
            </div>
            <div style=${{fontWeight:900,fontSize:22,color:p.bg,fontFamily:HF,flexShrink:0}}>${l.hours}h</div>
          </div>`;})}
          ${logs.length===0&&html`<p style=${{padding:28,textAlign:"center",color:MT,background:"#fff",borderRadius:14}}>No hours yet — go volunteer!</p>`}
        </div>
      </div>`}
    </main>
  </div>`;
}

function App(){
  const[profile,setProfile]=useState(null);
  const[loading,setLoading]=useState(true);

  useEffect(()=>{
    sb.auth.getSession().then(async({data:{session}})=>{
      if(session){const{data}=await sb.from("profiles").select("*").eq("id",session.user.id).single();setProfile(data);}
      setLoading(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange(event=>{
      if(event==="SIGNED_OUT")setProfile(null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  const logout=async()=>{await sb.auth.signOut();setProfile(null);};

  if(loading)return html`<${Spin}/>`;
  if(!profile)return html`<${Auth} onAuth=${p=>setProfile(p)}/>`;
  if(profile.role==="admin")return html`<${Admin} profile=${profile} onLogout=${logout}/>`;
  return html`<${Volunteer} profile=${profile} onLogout=${logout} onUpdateProfile=${setProfile}/>`;
}

render(h(App,null),document.getElementById("app"));
</script>

<script>
// PWA Install prompt
let deferredPrompt;
const banner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');
const dismissBtn = document.getElementById('dismiss-btn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (banner) banner.style.display = 'flex';
});

if (installBtn) {
  installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const result = await deferredPrompt.userChoice;
      deferredPrompt = null;
    }
    if (banner) banner.style.display = 'none';
  });
}
if (dismissBtn) {
  dismissBtn.addEventListener('click', () => {
    if (banner) banner.style.display = 'none';
  });
}

// Register service worker for offline support
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('data:text/javascript,self.addEventListener("fetch",e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))))').catch(()=>{});
}
</script>
