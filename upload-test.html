<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Test</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #f4f9f4; }
.upload-label {
  display: block;
  background: white;
  border: 3px dashed #C8DFC8;
  border-radius: 12px;
  padding: 30px;
  text-align: center;
  margin-bottom: 16px;
  cursor: pointer;
  transition: all .2s;
}
.upload-label:active { background: #EAF5EA; border-color: #5CB85C; }
.upload-label.done { border-color: #5CB85C; background: #EAF5EA; }
.upload-label input[type=file] {
  display: block;
  width: 100%;
  opacity: 0;
  height: 0;
  overflow: hidden;
}
img { max-width: 100px; border-radius: 8px; margin-top: 10px; }
p { color: #5A7A65; font-size: 14px; margin-top: 8px; }
</style>
</head>
<body>

<h2>Upload Test</h2>
<p>Tap the box below to upload a photo:</p>

<label class="upload-label" id="box1">
  <div id="icon1" style="font-size:36px;">📷</div>
  <p id="txt1">Tap here to upload photo</p>
  <input type="file" accept="image/*" onchange="handleFile(event)">
</label>

<div id="result" style="display:none;background:white;border-radius:12px;padding:16px;border:2px solid #5CB85C;">
  <strong>✅ File selected:</strong>
  <p id="fname"></p>
  <img id="preview" src="" alt="">
</div>

<script>
function handleFile(e) {
  const file = e.target.files[0];
  if(!file) { alert('No file selected'); return; }

  // Update box
  document.getElementById('box1').classList.add('done');
  document.getElementById('icon1').textContent = '✅';
  document.getElementById('txt1').textContent = file.name;

  // Show result
  document.getElementById('result').style.display = 'block';
  document.getElementById('fname').textContent = 'Name: ' + file.name + ' | Size: ' + Math.round(file.size/1024) + 'KB | Type: ' + file.type;

  // Preview
  if(file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      document.getElementById('preview').src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }
}
</script>

</body>
</html>
